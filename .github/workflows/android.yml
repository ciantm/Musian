name: Android Build & Upload

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync web assets
        run: cp Jellyfin.Plugin.Musian/Configuration/app.html android-app/www/app.html

      - name: Generate Android icons from logo
        run: |
          sudo apt-get install -y librsvg2-bin
          FONT_URL=$(curl -fsSL -A "Mozilla/4.0" "https://fonts.googleapis.com/css?family=Pinyon+Script" | grep -oP 'url\(\K[^)]+' | head -1)
          curl -fsSL "$FONT_URL" -o /tmp/PinyonScript.ttf
          sudo mkdir -p /usr/share/fonts/truetype/pinyon
          sudo cp /tmp/PinyonScript.ttf /usr/share/fonts/truetype/pinyon/
          sudo fc-cache -fv
          BASE=android-app/android/app/src/main/res
          rsvg-convert -w 48  -h 48  icon.svg > $BASE/mipmap-mdpi/ic_launcher.png
          rsvg-convert -w 72  -h 72  icon.svg > $BASE/mipmap-hdpi/ic_launcher.png
          rsvg-convert -w 96  -h 96  icon.svg > $BASE/mipmap-xhdpi/ic_launcher.png
          rsvg-convert -w 144 -h 144 icon.svg > $BASE/mipmap-xxhdpi/ic_launcher.png
          rsvg-convert -w 192 -h 192 icon.svg > $BASE/mipmap-xxxhdpi/ic_launcher.png
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp $BASE/mipmap-${d}/ic_launcher.png $BASE/mipmap-${d}/ic_launcher_round.png
            cp $BASE/mipmap-${d}/ic_launcher.png $BASE/mipmap-${d}/ic_launcher_foreground.png
          done

      - name: Capacitor sync
        working-directory: android-app
        run: |
          npm install
          npx cap sync android

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > android-app/android/app/release.jks

      - name: Build release APK
        working-directory: android-app/android
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}
        run: |
          chmod +x gradlew
          TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -r a b c d <<< "$TAG"
          VERSION_CODE=$(( a * 1000000 + b * 10000 + c * 100 + ${d:-0} ))
          ./gradlew assembleRelease \
            -PversionCode=$VERSION_CODE \
            -PversionName=$TAG

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONF: ${{ secrets.R_CLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload APK to Google Drive
        run: |
          TAG="${GITHUB_REF_NAME}"
          rclone copy \
            android-app/android/app/build/outputs/apk/release/app-release.apk \
            "gdrive:Businesses & Projects/Musian/" \
            --drive-use-trash=false \
            --no-update-modtime
          rclone moveto \
            "gdrive:Businesses & Projects/Musian/app-release.apk" \
            "gdrive:Businesses & Projects/Musian/Musian-${TAG}.apk"
