name: Android Build & Upload

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync web assets
        run: cp Jellyfin.Plugin.Musian/Configuration/app.html android-app/www/app.html

      - name: Generate Android icons from logo
        run: |
          sudo apt-get install -y librsvg2-bin
          BASE=android-app/android/app/src/main/res
          rsvg-convert -w 48  -h 48  icon.svg > $BASE/mipmap-mdpi/ic_launcher.png
          rsvg-convert -w 72  -h 72  icon.svg > $BASE/mipmap-hdpi/ic_launcher.png
          rsvg-convert -w 96  -h 96  icon.svg > $BASE/mipmap-xhdpi/ic_launcher.png
          rsvg-convert -w 144 -h 144 icon.svg > $BASE/mipmap-xxhdpi/ic_launcher.png
          rsvg-convert -w 192 -h 192 icon.svg > $BASE/mipmap-xxxhdpi/ic_launcher.png
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp $BASE/mipmap-${d}/ic_launcher.png $BASE/mipmap-${d}/ic_launcher_round.png
            cp $BASE/mipmap-${d}/ic_launcher.png $BASE/mipmap-${d}/ic_launcher_foreground.png
          done

      - name: Capacitor sync
        working-directory: android-app
        run: |
          npm install
          npx cap sync android

      - name: Restore consistent debug keystore
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          mkdir -p ~/.android
          printf '%s' "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore

      - name: Build debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONF: ${{ secrets.R_CLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload APK to Google Drive
        run: |
          TAG="${GITHUB_REF_NAME}"
          rclone copy \
            android-app/android/app/build/outputs/apk/debug/app-debug.apk \
            "gdrive:Businesses & Projects/Musian/" \
            --drive-use-trash=false \
            --no-update-modtime
          rclone moveto \
            "gdrive:Businesses & Projects/Musian/app-debug.apk" \
            "gdrive:Businesses & Projects/Musian/Musian-${TAG}.apk"
