name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'build.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      artifact: ${{ steps.version.outputs.artifact }}
      checksum: ${{ steps.pkg.outputs.checksum }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Parse version from build.yaml
        id: version
        run: |
          VER=$(grep '^version:' build.yaml | sed 's/version: *"\(.*\)"/\1/')
          TAG="v${VER}"
          ARTIFACT="Jellyfin.Plugin.Musian_${VER}.zip"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VER"       >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          dotnet build \
            Jellyfin.Plugin.Musian/Jellyfin.Plugin.Musian.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ./build_output

      - name: Package
        id: pkg
        run: |
          ARTIFACT="${{ steps.version.outputs.artifact }}"
          cd build_output
          zip "../${ARTIFACT}" Jellyfin.Plugin.Musian.dll
          cd ..
          echo "checksum=$(md5sum "${ARTIFACT}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ steps.version.outputs.artifact }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Musian ${{ steps.version.outputs.version }}
          body: |
            ## Musian ${{ steps.version.outputs.version }}

            ### Install via Jellyfin
            Add this manifest URL to Jellyfin → Dashboard → Plugins → Repositories:
            ```
            https://ciantm.github.io/Musian/manifest.json
            ```
            Then search for **Musian** in the plugin catalogue.

            ### Manual install
            Download `${{ steps.version.outputs.artifact }}`, extract the DLL into your Jellyfin plugins folder and restart.

            **MD5:** `${{ steps.pkg.outputs.checksum }}`
          files: ${{ steps.version.outputs.artifact }}
          fail_on_unmatched_files: true

  update-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - name: Compute timestamp
        id: meta
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          python3 update_manifest.py \
            --version   "${{ needs.build.outputs.version }}" \
            --tag       "${{ needs.build.outputs.tag }}" \
            --checksum  "${{ needs.build.outputs.checksum }}" \
            --timestamp "${{ steps.meta.outputs.timestamp }}"

      - name: Commit & push manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ needs.build.outputs.tag }}" || echo "No changes"
          git push
