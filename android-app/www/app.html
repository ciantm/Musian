<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Musian</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#111; color:#fff; font-family:sans-serif; min-height:100vh; overflow-x:hidden; }
#jmApp { display:flex; flex-direction:column; align-items:center; padding:24px 16px 48px; width:100%; }
#jmGenreArea { width:100%; max-width:min(80vw,420px); margin-top:18px; }
#jmWheelPrompt { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:2;transition:opacity 0.4s; }
#jmMoodName { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72%;text-align:center;pointer-events:none;z-index:3;transition:opacity 0.4s;font-size:1.2em;font-weight:300;letter-spacing:0.08em;text-shadow:0 0 32px #000,0 0 12px #000;opacity:0; }
#jmGenreWrap { position:relative; width:100%; touch-action:none; cursor:pointer; }
#jmGenreBar { width:100%; height:44px; border-radius:10px; background:linear-gradient(to right,#c8b860,#1a5070,#6a7840,#b040a0,#c06020,#b02010,#806000,#200010); }
#jmGenreHighlight { position:absolute; top:0; height:44px; border-radius:10px; background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.7); pointer-events:none; transition:left 0.15s,width 0.15s; display:none; }
#jmGenreLabelsTop, #jmGenreLabels { display:flex; width:100%; }
#jmGenreLabelsTop { margin-bottom:4px; }
#jmGenreLabels { margin-top:4px; }
#jmGenreLabelsTop span, #jmGenreLabels span { flex:1; text-align:center; font-size:0.58em; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:rgba(255,255,255,0.5); }
#jmPlayer { margin-top:16px; text-align:center; width:100%; max-width:420px; }
.jm-btn { padding:10px 28px; border:none; border-radius:24px; font-size:0.9em; font-weight:700; cursor:pointer; color:#fff; }
#jmSkipBtn { background:rgba(255,255,255,0.12); margin-right:8px; }
#jmStopBtn { background:rgba(255,255,255,0.08); }
#jmSearch { width:100%; background:#1e1e1e; border:1px solid #333; border-radius:20px;
            color:#fff; font-size:0.85em; padding:9px 16px; outline:none; }
#jmSearch:focus { border-color:#555; }
#jmSuggest { position:absolute; top:calc(100% + 4px); left:0; right:0;
             background:#1e1e1e; border:1px solid #333; border-radius:10px;
             overflow:hidden; z-index:10; display:none; }
.jm-sug-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid #222; text-align:left; }
.jm-sug-item:last-child { border-bottom:none; }
.jm-sug-item:hover, .jm-sug-item:active { background:#2a2a2a; }
.jm-sug-title { font-size:0.85em; color:#fff; }
.jm-sug-artist { font-size:0.75em; color:#888; margin-top:2px; }
</style>
</head>
<body>
<div id="jmApp">
  <h2 style="font-size:1.6em;font-weight:300;letter-spacing:0.06em;margin:0 0 32px;display:flex;align-items:baseline;gap:10px;"><span>&#127925; Musian</span><span style="font-size:0.38em;color:#444;">v1.6.0</span></h2>

  <div id="jmWheelWrap" style="position:relative;width:min(80vw,420px);height:min(80vw,420px);margin:0 auto 8px;">
    <svg id="jmSvgWheel" viewBox="0 0 400 400" width="100%" height="100%"
         xmlns="http://www.w3.org/2000/svg"
         style="display:block;cursor:crosshair;filter:drop-shadow(0 0 40px rgba(0,0,0,0.9));touch-action:none;">
      <defs>
        <radialGradient id="gRed" cx="0%" cy="0%" r="100%" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#ff1a00" stop-opacity="1"/>
          <stop offset="70%" stop-color="#ff1a00" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gYellow" cx="100%" cy="0%" r="100%" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#ffe800" stop-opacity="1"/>
          <stop offset="70%" stop-color="#ffe800" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gTeal" cx="100%" cy="100%" r="100%" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#00e8c0" stop-opacity="1"/>
          <stop offset="70%" stop-color="#00e8c0" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gGlow" cx="50%" cy="50%" r="35%" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
        <clipPath id="circClip"><circle cx="200" cy="200" r="196"/></clipPath>
      </defs>
      <circle cx="200" cy="200" r="196" fill="#000000"/>
      <g clip-path="url(#circClip)">
        <rect x="0" y="0" width="400" height="400" fill="url(#gRed)"/>
        <rect x="0" y="0" width="400" height="400" fill="url(#gYellow)" style="mix-blend-mode:screen"/>
        <rect x="0" y="0" width="400" height="400" fill="url(#gTeal)" style="mix-blend-mode:screen"/>
        <rect x="0" y="0" width="400" height="400" fill="url(#gGlow)" style="mix-blend-mode:screen"/>
      </g>
      <circle cx="200" cy="200" r="196" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <line x1="200" y1="4" x2="200" y2="396" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,5"/>
      <line x1="4" y1="200" x2="396" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,5"/>
      <circle cx="200" cy="200" r="196" fill="transparent"/>
    </svg>
    <div id="jmMoodName"></div>
    <div id="jmWheelPrompt">
      <div style="font-size:1.1em;font-weight:300;letter-spacing:0.1em;color:rgba(255,255,255,0.75);text-shadow:0 0 24px #000,0 0 8px #000;">Feel your music</div>
      <div style="font-size:0.72em;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.38);margin-top:6px;text-shadow:0 0 12px #000;">Tap to play</div>
    </div>
    <span style="position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:0.62em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);pointer-events:none;text-shadow:0 0 8px #000;">Active</span>
    <span style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:0.62em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);pointer-events:none;text-shadow:0 0 8px #000;">Passive</span>
    <span style="position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:0.62em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);pointer-events:none;text-shadow:0 0 8px #000;">Negative</span>
    <span style="position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:0.62em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);pointer-events:none;text-shadow:0 0 8px #000;">Positive</span>
    <span style="position:absolute;top:32px;left:32px;font-size:0.65em;font-weight:700;color:#ff7070;line-height:1.3;pointer-events:none;text-shadow:0 0 8px #000;">Angry<br>Tense</span>
    <span style="position:absolute;top:32px;right:32px;font-size:0.65em;font-weight:700;color:#ffe066;line-height:1.3;text-align:right;pointer-events:none;text-shadow:0 0 8px #000;">Happy<br>Excited</span>
    <span style="position:absolute;bottom:32px;left:32px;font-size:0.65em;font-weight:700;color:#7ba3ff;line-height:1.3;pointer-events:none;text-shadow:0 0 8px #000;">Sad<br>Lonely</span>
    <span style="position:absolute;bottom:32px;right:32px;font-size:0.65em;font-weight:700;color:#5ee8cc;line-height:1.3;text-align:right;pointer-events:none;text-shadow:0 0 8px #000;">Calm<br>Serene</span>
  </div>

  <div id="jmGenreArea">
    <div id="jmGenreLabelsTop"></div>
    <div id="jmGenreWrap">
      <div id="jmGenreBar"></div>
      <div id="jmGenreHighlight"></div>
    </div>
    <div id="jmGenreLabels"></div>
  </div>

  <div id="jmUpNext" style="display:none;margin-top:10px;font-size:0.75em;color:#555;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:min(80vw,420px);"></div>

  <div style="text-align:center;">
    <div id="jmStatus" style="font-size:0.8em;color:#777;min-height:1.2em;"></div>
  </div>

  <div id="jmPlayer" style="margin-top:16px;text-align:center;width:100%;max-width:420px;">
    <audio id="jmAudio" playsinline></audio>
    <div id="jmSearchWrap" style="position:relative;margin-bottom:10px;">
      <input id="jmSearch" type="search" placeholder="Search song…" autocomplete="off" autocapitalize="none" spellcheck="false"/>
      <div id="jmSuggest"></div>
    </div>
    <div id="jmControls" style="display:none;margin-top:16px;">
      <button id="jmSkipBtn" class="jm-btn">&#9197; Skip</button>
      <button id="jmStopBtn" class="jm-btn">&#9209; Stop</button>
    </div>
  </div>

  <div id="jmTrackCount" style="display:none;margin-top:8px;font-size:0.78em;color:#555;text-align:center;"></div>
  <button id="jmSignOutBtn" style="margin-top:32px;background:none;border:none;color:#555;font-size:0.8em;cursor:pointer;text-decoration:underline;">Sign out</button>
</div>

<script>
// ── Backend adapters ──────────────────────────────────────────────────────────
var jmGenreCache = null;
var Backend = null;

function expandGenres(seeds) {
  if (!jmGenreCache || !jmGenreCache.length) return seeds;
  var result = {};
  seeds.forEach(function(seed) {
    result[seed] = true;
    var sn = seed.toLowerCase().replace(/[^a-z0-9]/g, '');
    jmGenreCache.forEach(function(g) {
      if (/^not[\s_]/i.test(g)) return;
      if (g.toLowerCase().replace(/[^a-z0-9]/g, '').indexOf(sn) !== -1) result[g] = true;
    });
  });
  return Object.keys(result);
}

function makeJellyfinBackend(auth) {
  function headers() {
    return { 'X-Emby-Authorization':
      'MediaBrowser Client="Musian",Device="Android",DeviceId="jm-android",Version="1.0"' +
      ',Token="' + auth.accessToken + '"' };
  }
  return {
    loadGenreCache: function() {
      return fetch(auth.serverUrl + '/Genres?' + new URLSearchParams({
        IncludeItemTypes:'Audio', Recursive:'true', Limit:'500'
      }), {headers: headers()})
      .then(function(r){ return r.json(); })
      .then(function(d){ jmGenreCache = (d.Items||[]).map(function(g){ return g.Name; }); })
      .catch(function(){});
    },
    libraryCount: function() {
      return fetch(auth.serverUrl + '/Users/' + auth.userId + '/Items?' +
        new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', Limit:'1'}),
        {headers: headers()})
        .then(function(r){ return r.json(); })
        .then(function(d){ return d.TotalRecordCount || 0; });
    },
    fetchTracksByGenres: function(genres) {
      var expanded = expandGenres(genres);
      var params = new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', SortBy:'Random', Limit:'10', Fields:'Genres,MediaSources'});
      if (expanded.length > 0) params.set('Genres', expanded.join('|'));
      return fetch(auth.serverUrl + '/Users/' + auth.userId + '/Items?' + params, {headers: headers()})
        .then(function(r){ return r.json(); })
        .then(function(d){ return d.Items || []; });
    },
    fetchFallback: function() {
      return fetch(auth.serverUrl + '/Users/' + auth.userId + '/Items?' +
        new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', SortBy:'Random', Limit:'10'}),
        {headers: headers()})
        .then(function(r){ return r.json(); })
        .then(function(d){ return d.Items || []; });
    },
    searchTracks: function(q, limit) {
      return fetch(auth.serverUrl + '/Users/' + auth.userId + '/Items?' + new URLSearchParams({
        SearchTerm: q, IncludeItemTypes: 'Audio', Recursive: 'true',
        Limit: String(limit), Fields: 'Genres,Artists,AlbumArtist'
      }), {headers: headers()})
        .then(function(r){ return r.json(); })
        .then(function(d){ return d.Items || []; });
    },
    streamUrl: function(item) {
      return auth.serverUrl + '/Audio/' + item.Id + '/universal' +
        '?UserId=' + auth.userId +
        '&DeviceId=jm-android' +
        '&MaxStreamingBitrate=140000000' +
        '&Container=mp3,aac,m4a,flac,ogg,opus,webma,webm,wav' +
        '&AudioCodec=aac,mp3,flac,opus,vorbis' +
        '&TranscodingContainer=mp3' +
        '&TranscodingProtocol=http' +
        '&api_key=' + auth.accessToken;
    },
    trackLabel: function(item) {
      var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
      return (artist ? artist + ' \u2014 ' : '') + (item.Name || '');
    },
    itemId: function(item) { return item.Id; },
    itemGenres: function(item) { return item.Genres || []; },
    mediaMetadata: function(item) {
      return {
        title:  item.Name  || 'Musian',
        artist: (item.Artists && item.Artists[0]) || item.AlbumArtist || '',
        album:  item.Album || ''
      };
    }
  };
}

function makeSubsonicBackend(auth) {
  function ap() {
    return '?u=' + encodeURIComponent(auth.username) +
           '&p=' + encodeURIComponent(auth.password) +
           '&v=1.16.1&c=Musian&f=json';
  }
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
  }
  return {
    loadGenreCache: function() {
      return fetch(auth.serverUrl + '/rest/getGenres.view' + ap())
        .then(function(r){ return r.json(); })
        .then(function(d){
          var gs = (d['subsonic-response'] && d['subsonic-response'].genres && d['subsonic-response'].genres.genre) || [];
          jmGenreCache = gs.map(function(g){ return g.value || g.name || String(g); });
        })
        .catch(function(){});
    },
    libraryCount: function() { return Promise.resolve(-1); },
    fetchTracksByGenres: function(genres) {
      var self = this;
      var expanded = expandGenres(genres);
      if (!expanded.length) return self.fetchFallback();
      var seen = {};
      var promises = expanded.map(function(genre) {
        return fetch(auth.serverUrl + '/rest/getSongsByGenre.view' + ap() +
          '&genre=' + encodeURIComponent(genre) + '&count=10')
          .then(function(r){ return r.json(); })
          .then(function(d){
            return ((d['subsonic-response'] && d['subsonic-response'].songsByGenre && d['subsonic-response'].songsByGenre.song) || []);
          })
          .catch(function(){ return []; });
      });
      return Promise.all(promises).then(function(results) {
        var merged = [];
        results.forEach(function(songs) {
          songs.forEach(function(s) {
            if (!seen[s.id]) { seen[s.id] = true; merged.push(s); }
          });
        });
        shuffle(merged);
        return merged.slice(0, 10);
      });
    },
    fetchFallback: function() {
      return fetch(auth.serverUrl + '/rest/getRandomSongs.view' + ap() + '&size=10')
        .then(function(r){ return r.json(); })
        .then(function(d){
          return ((d['subsonic-response'] && d['subsonic-response'].randomSongs && d['subsonic-response'].randomSongs.song) || []);
        })
        .catch(function(){ return []; });
    },
    searchTracks: function(q, limit) {
      return fetch(auth.serverUrl + '/rest/search3.view' + ap() +
        '&query=' + encodeURIComponent(q) + '&songCount=' + limit)
        .then(function(r){ return r.json(); })
        .then(function(d){
          return ((d['subsonic-response'] && d['subsonic-response'].searchResult3 && d['subsonic-response'].searchResult3.song) || []);
        })
        .catch(function(){ return []; });
    },
    streamUrl: function(item) {
      return auth.serverUrl + '/rest/stream.view' + ap() + '&id=' + item.id;
    },
    trackLabel: function(item) {
      return (item.artist ? item.artist + ' \u2014 ' : '') + (item.title || item.name || '');
    },
    itemId: function(item) { return item.id; },
    itemGenres: function(item) { return item.genre ? [item.genre] : []; },
    mediaMetadata: function(item) {
      return {
        title:  item.title || item.name || 'Musian',
        artist: item.artist || '',
        album:  item.album  || ''
      };
    }
  };
}

function makePlexBackend(auth) {
  var plexGenreMap = {};
  function ap() { return 'X-Plex-Token=' + auth.token; }
  function jh() { return {'Accept':'application/json'}; }
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
  }
  return {
    loadGenreCache: function() {
      return fetch(auth.serverUrl + '/library/sections/' + auth.sectionId + '/genre?type=10&' + ap(), {headers: jh()})
        .then(function(r){ return r.json(); })
        .then(function(d){
          var dirs = (d.MediaContainer && d.MediaContainer.Directory) || [];
          jmGenreCache = dirs.map(function(g){ return g.title; });
          dirs.forEach(function(g){ plexGenreMap[g.title.toLowerCase()] = g.key || g.id || g.ratingKey; });
        })
        .catch(function(){});
    },
    libraryCount: function() {
      return fetch(auth.serverUrl + '/library/sections/' + auth.sectionId + '/all?type=10&' + ap(), {headers: jh()})
        .then(function(r){ return r.json(); })
        .then(function(d){ return (d.MediaContainer && d.MediaContainer.totalSize) || 0; })
        .catch(function(){ return 0; });
    },
    fetchTracksByGenres: function(genres) {
      var self = this;
      var expanded = expandGenres(genres);
      var ids = [];
      expanded.forEach(function(g) {
        var key = plexGenreMap[g.toLowerCase()];
        if (key !== undefined) ids.push(key);
      });
      if (!ids.length) return self.fetchFallback();
      var seen = {};
      var promises = ids.map(function(id) {
        return fetch(auth.serverUrl + '/library/sections/' + auth.sectionId + '/all?type=10&genre=' + id + '&sort=random&' + ap(), {headers: jh()})
          .then(function(r){ return r.json(); })
          .then(function(d){ return (d.MediaContainer && d.MediaContainer.Metadata) || []; })
          .catch(function(){ return []; });
      });
      return Promise.all(promises).then(function(results) {
        var merged = [];
        results.forEach(function(tracks) {
          tracks.forEach(function(t) {
            var key = t.ratingKey || t.key;
            if (!seen[key]) { seen[key] = true; merged.push(t); }
          });
        });
        shuffle(merged);
        return merged.slice(0, 10);
      });
    },
    fetchFallback: function() {
      return fetch(auth.serverUrl + '/library/sections/' + auth.sectionId + '/all?type=10&sort=random&limit=10&' + ap(), {headers: jh()})
        .then(function(r){ return r.json(); })
        .then(function(d){ return (d.MediaContainer && d.MediaContainer.Metadata) || []; })
        .catch(function(){ return []; });
    },
    searchTracks: function(q, limit) {
      return fetch(auth.serverUrl + '/library/sections/' + auth.sectionId +
        '/search?type=10&query=' + encodeURIComponent(q) + '&limit=' + limit + '&' + ap(), {headers: jh()})
        .then(function(r){ return r.json(); })
        .then(function(d){ return (d.MediaContainer && d.MediaContainer.Metadata) || []; })
        .catch(function(){ return []; });
    },
    streamUrl: function(item) {
      var part = item.Media && item.Media[0] && item.Media[0].Part && item.Media[0].Part[0];
      if (part && part.key) return auth.serverUrl + part.key + '?' + ap();
      return auth.serverUrl + '/library/metadata/' + item.ratingKey + '/download?' + ap();
    },
    trackLabel: function(item) {
      var artist = item.grandparentTitle || item.originalTitle || '';
      return (artist ? artist + ' \u2014 ' : '') + (item.title || '');
    },
    itemId: function(item) { return item.ratingKey || item.key; },
    itemGenres: function(item) {
      return (item.Genre || []).map(function(g){ return g.tag; });
    },
    mediaMetadata: function(item) {
      return {
        title:  item.title || 'Musian',
        artist: item.grandparentTitle || item.originalTitle || '',
        album:  item.parentTitle || ''
      };
    }
  };
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function() {
  var auth = null;
  try { auth = JSON.parse(localStorage.getItem('jm_auth')); } catch(e) {}
  if (!auth || !auth.type || !auth.serverUrl) { window.location.replace('index.html'); return; }
  Backend = auth.type === 'subsonic' ? makeSubsonicBackend(auth)
           : auth.type === 'plex'    ? makePlexBackend(auth)
           :                           makeJellyfinBackend(auth);
  Backend.loadGenreCache();
})();

document.getElementById('jmSignOutBtn').addEventListener('click', function() {
  localStorage.removeItem('jm_auth');
  window.location.replace('index.html');
});

// Library count
Backend.libraryCount().then(function(n) {
  if (n < 0) {
    document.getElementById('jmStatus').textContent = 'Connected';
  } else if (!n) {
    document.getElementById('jmStatus').textContent = 'Library has 0 audio tracks — check media libraries.';
    document.getElementById('jmStatus').style.color = '#f88';
  } else {
    document.getElementById('jmStatus').textContent = n + ' audio tracks in library';
  }
}).catch(function() {
  document.getElementById('jmStatus').textContent = 'Could not reach server.';
  document.getElementById('jmStatus').style.color = '#f88';
});

(function(){
'use strict';
var MOODS = [
  { name:'Aggressive',  x:0.08, y:0.95, col:'#ff3030', genres:['Heavy Metal','Metalcore','Punk Rock','Hard Rock','Alternative Metal'] },
  { name:'Angry',       x:0.10, y:0.90, col:'#ff4040', genres:['Heavy Metal','Hard Rock','Punk Rock','Alternative Metal','Traditional Heavy Metal'] },
  { name:'Frantic',     x:0.12, y:0.92, col:'#ff3535', genres:['Metalcore','Punk Rock','Post-Hardcore','Hard Rock','Alternative Metal'] },
  { name:'Defiant',     x:0.15, y:0.82, col:'#ff5030', genres:['Punk Rock','Hard Rock','Rap Rock','Post-Hardcore','Alternative Rock'] },
  { name:'Intense',     x:0.20, y:0.88, col:'#ff4535', genres:['Heavy Metal','Hard Rock','Alternative Metal','Blues Rock','Metalcore'] },

(function() {
  var wrap         = document.getElementById('jmGenreWrap');
  var highlight    = document.getElementById('jmGenreHighlight');
  var labelsTopEl  = document.getElementById('jmGenreLabelsTop');
  var labelsEl     = document.getElementById('jmGenreLabels');
  var n            = GENRES.length;

  GENRES.forEach(function(genre, i) {
    var top = document.createElement('span');
    var bot = document.createElement('span');
    if (i % 2 === 0) {
      top.textContent = genre.name;
      bot.style.visibility = 'hidden'; bot.textContent = '\u00a0';
    } else {
      top.style.visibility = 'hidden'; top.textContent = '\u00a0';
      bot.textContent = genre.name;
    }
    labelsTopEl.appendChild(top);
    labelsEl.appendChild(bot);
  });

  function handleGenreInteraction(clientX) {
    var rect = wrap.getBoundingClientRect();
    var rel  = (clientX - rect.left) / rect.width;
    var idx  = Math.floor(rel * n);
    idx = Math.max(0, Math.min(n - 1, idx));

    var lo = idx, hi = idx;
    var selected = GENRES.slice(lo, hi + 1);

    var leftPct  = (lo / n) * 100;
    var widthPct = ((hi - lo + 1) / n) * 100;
    highlight.style.left    = leftPct + '%';
    highlight.style.width   = widthPct + '%';
    highlight.style.display = 'block';

    [labelsTopEl, labelsEl].forEach(function(row) {
      row.querySelectorAll('span').forEach(function(s, i) {
        var active = (i >= lo && i <= hi);
        s.style.color = active ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.3)';
        s.style.fontWeight = active ? '700' : '400';
      });
    });

    var genreMap = {};
    selected.forEach(function(e) { e.genres.forEach(function(g) { genreMap[g] = true; }); });
    jmGenreFilter = Object.keys(genreMap);

    if (jmMoodGenres !== null) {
      setStatus('Searching\u2026');
      setTrackCount(0);
      var genreG = jmGenreFilter, moodG = jmMoodGenres;
      jmRefetchFn = function() { return fetchTracksByGenres(genreG); };
      fetchTracksByGenres(genreG)
        .then(function(items) { return items.length > 0 ? items : fetchTracksByGenres(moodG); })
        .then(function(items) { return items.length > 0 ? items : fetchFallback(); })
        .then(function(items) {
          setTrackCount(items.length);
          if (!items.length) { setStatus('No tracks found.'); return; }
          startPlayback(items);
        })
        .catch(function() { setStatus('Could not fetch tracks.'); });
    }
  }

  wrap.addEventListener('click', function(e) { handleGenreInteraction(e.clientX); });
  wrap.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleGenreInteraction(e.changedTouches[0].clientX);
  });
})();

// ── Player ───────────────────────────────────────────────────────────────────
var jmPlaylist   = [];
var jmPlayIdx    = 0;
var jmGeneration = 0;
var jmMoodGenres = null;
var jmAudio      = document.getElementById('jmAudio');
var jmRefetchFn  = null;
var jmPlayedIds  = [];
var jmFetching   = false;

function jmShowPrompt(visible) {
  var p = document.getElementById('jmWheelPrompt');
  if (!p) return;
  if (visible) { p.style.display = 'block'; setTimeout(function(){ p.style.opacity = '1'; }, 10); }
  else { p.style.opacity = '0'; setTimeout(function(){ p.style.display = 'none'; }, 400); }
}

function jmAdvance(gen) {
  return function() {
    if (gen !== jmGeneration) return;
    jmPlayIdx++;
    jmPlayTrack(jmPlayIdx, gen);
  };
}

function jmUpdateMediaSession(item) {
  if (!('mediaSession' in navigator)) return;
  var meta = Backend.mediaMetadata(item);
  navigator.mediaSession.metadata = new MediaMetadata(meta);
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.setActionHandler('play', function() {
    jmAudio.play().catch(function() {});
    navigator.mediaSession.playbackState = 'playing';
  });
  navigator.mediaSession.setActionHandler('pause', function() {
    jmAudio.pause();
    navigator.mediaSession.playbackState = 'paused';
  });
  navigator.mediaSession.setActionHandler('nexttrack', function() {
    jmPlayIdx++; jmPlayTrack(jmPlayIdx, jmGeneration);
  });
  navigator.mediaSession.setActionHandler('previoustrack', function() {
    jmPlayIdx = Math.max(0, jmPlayIdx - 1);
    jmPlayTrack(jmPlayIdx, jmGeneration);
  });
  navigator.mediaSession.setActionHandler('stop', function() {
    document.getElementById('jmStopBtn').click();
  });
}

document.addEventListener('visibilitychange', function() {
  if (!document.hidden && jmPlaylist.length > 0 && jmAudio.paused && !jmAudio.ended) {
    jmAudio.play().catch(function() {});
  }
});

function jmPlayTrack(idx, gen) {
  if (gen !== jmGeneration) return;
  if (idx >= jmPlaylist.length) {
    setStatus('Playlist ended — tap the wheel to play again.');
    document.getElementById('jmSearch').placeholder = 'Search song\u2026';
    document.getElementById('jmControls').style.display = 'none';
    document.getElementById('jmUpNext').style.display = 'none';
    if ('mediaSession' in navigator) { navigator.mediaSession.metadata = null; navigator.mediaSession.playbackState = 'none'; }
    return;
  }
  var item = jmPlaylist[idx];
  jmPlayedIds.push(Backend.itemId(item));
  if (jmRefetchFn && !jmFetching && jmPlaylist.length - idx <= 2) {
    jmFetching = true;
    var _gen = gen;
    jmRefetchFn().then(function(more) {
      jmFetching = false;
      if (_gen !== jmGeneration) return;
      more = more.filter(function(t) { return jmPlayedIds.indexOf(Backend.itemId(t)) === -1; });
      if (more.length) jmPlaylist = jmPlaylist.concat(more);
    }).catch(function() { jmFetching = false; });
  }
  jmAudio.pause();
  jmAudio.src = Backend.streamUrl(item);
  jmAudio.play().catch(function() {});
  document.getElementById('jmSearch').placeholder = Backend.trackLabel(item);
  document.getElementById('jmControls').style.display = 'block';
  var next = jmPlaylist[idx + 1];
  var upNextEl = document.getElementById('jmUpNext');
  if (next) {
    upNextEl.textContent = 'Up next \u00b7 ' + Backend.trackLabel(next);
    upNextEl.style.display = 'block';
  } else {
    upNextEl.style.display = 'none';
  }
  setStatus('Playing \u266a');
  jmUpdateMediaSession(item);
}

function attachPlayerListeners(gen) {
  jmAudio.addEventListener('ended', jmAdvance(gen));
  jmAudio.addEventListener('error', function() {
    if (gen !== jmGeneration) return;
    var code = jmAudio.error ? jmAudio.error.code : '?';
    setStatus('Track error (code ' + code + ') — skipping\u2026');
    jmPlayIdx++;
    jmPlayTrack(jmPlayIdx, gen);
  });
}

document.getElementById('jmSkipBtn').addEventListener('click', function() {
  jmPlayIdx++;
  jmPlayTrack(jmPlayIdx, jmGeneration);
});
document.getElementById('jmStopBtn').addEventListener('click', function() {
  jmGeneration++;
  jmAudio.pause(); jmAudio.src = '';
  jmPlaylist = [];
  document.getElementById('jmSearch').placeholder = 'Search song\u2026';
  document.getElementById('jmControls').style.display = 'none';
  document.getElementById('jmUpNext').style.display = 'none';
  setStatus(''); setTrackCount(0); setMoodName('', '');
  if ('mediaSession' in navigator) { navigator.mediaSession.metadata = null; navigator.mediaSession.playbackState = 'none'; }
  jmMoodGenres = null;
  jmGenreFilter = null;
  jmRefetchFn = null;
  jmPlayedIds = [];
  jmShowPrompt(true);
  var hl = document.getElementById('jmGenreHighlight');
  if (hl) hl.style.display = 'none';
  ['jmGenreLabelsTop','jmGenreLabels'].forEach(function(id) {
    document.getElementById(id).querySelectorAll('span').forEach(function(s) {
      s.style.color = ''; s.style.fontWeight = '';
    });
  });
});

function startPlayback(items) {
  jmGeneration++;
  jmAudio.pause();
  jmPlaylist = items; jmPlayIdx = 0;
  jmPlayedIds = []; jmFetching = false;
  attachPlayerListeners(jmGeneration);
  jmPlayTrack(0, jmGeneration);
}

// ── Mood logic ────────────────────────────────────────────────────────────────
function getNearestMoods(vx, vy, count) {
  return MOODS.slice().sort(function(a, b) {
    var da = (vx-a.x)*(vx-a.x) + (vy-a.y)*(vy-a.y);
    var db = (vx-b.x)*(vx-b.x) + (vy-b.y)*(vy-b.y);
    return da - db;
  }).slice(0, count);
}

function handleInteraction(clientX, clientY) {
  var wrap = document.getElementById('jmWheelWrap');
  var rect = wrap.getBoundingClientRect();
  var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2, r = rect.width/2;
  var dx = clientX - cx, dy = clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) > r) return;

  var valence = (dx/r)*0.5 + 0.5;
  var arousal  = (-dy/r)*0.5 + 0.5;

  var nearest = getNearestMoods(valence, arousal, 4);
  var nearest1 = nearest[0];

  var old = wrap.querySelectorAll('.jm-dot');
  for (var i = 0; i < old.length; i++) wrap.removeChild(old[i]);
  var dot = document.createElement('div');
  dot.className = 'jm-dot';
  dot.style.cssText = 'position:absolute;width:22px;height:22px;border-radius:50%;' +
    'transform:translate(-50%,-50%);pointer-events:none;' +
    'box-shadow:0 0 0 3px rgba(0,0,0,0.5),0 0 14px rgba(255,255,255,0.8);';
  dot.style.background = nearest1.col;
  dot.style.left = (clientX - rect.left) + 'px';
  dot.style.top  = (clientY - rect.top)  + 'px';
  wrap.appendChild(dot);

  jmShowPrompt(false);
  setMoodName(nearest.map(function(m) { return m.name; }).join(' + '), nearest1.col);
  setTrackCount(0);

  // Floating mood name animation — one per quadrant, successively
  var old2 = wrap.querySelectorAll('.jm-mlabel');
  for (var j = 0; j < old2.length; j++) wrap.removeChild(old2[j]);
  var QPOS = [{qx:0.27,qy:0.30},{qx:0.73,qy:0.30},{qx:0.27,qy:0.70},{qx:0.73,qy:0.70}];
  nearest.forEach(function(m, idx) {
    var q = (m.x < 0.5 ? 0 : 1) + (m.y >= 0.5 ? 0 : 2);
    var lx = QPOS[q].qx * rect.width;
    var ly = QPOS[q].qy * rect.height;
    var delay = idx * 650;
    (function(mood, elx, ely, d) {
      var el = document.createElement('div');
      el.className = 'jm-mlabel';
      el.textContent = mood.name;
      el.style.cssText = 'position:absolute;pointer-events:none;font-size:0.68em;font-weight:600;' +
        'letter-spacing:0.1em;text-transform:uppercase;color:' + mood.col + ';' +
        'text-shadow:0 0 12px #000,0 0 4px #000;transform:translate(-50%,-50%);' +
        'transition:opacity 0.4s;opacity:0;white-space:nowrap;';
      el.style.left = elx + 'px';
      el.style.top  = ely + 'px';
      wrap.appendChild(el);
      setTimeout(function() { el.style.opacity = '0.9'; }, d + 30);
      setTimeout(function() { el.style.opacity = '0'; }, d + 480);
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, d + 920);
    }(m, lx, ly, delay));
  });

  var genreMap = {};
  nearest.forEach(function(m) { m.genres.forEach(function(g) { genreMap[g] = true; }); });
  var genres = Object.keys(genreMap);
  jmMoodGenres = genres;

  var moodGenres = genres;
  if (jmGenreFilter !== null) genres = jmGenreFilter;

  var _refetchGenres = genres;
  jmRefetchFn = function() { return fetchTracksByGenres(_refetchGenres); };

  setStatus('Searching\u2026');

  fetchTracksByGenres(genres)
    .then(function(items) {
      if (items.length > 0) return items;
      if (jmGenreFilter !== null && moodGenres.length > 0) return fetchTracksByGenres(moodGenres);
      return fetchFallback();
    })
    .then(function(items) {
      setTrackCount(items.length);
      if (!items.length) { setStatus('No tracks found — check genre tags in your library.'); return; }
      startPlayback(items);
    })
    .catch(function(e) {
      console.error('[Musian]', e);
      setStatus('Could not fetch tracks.');
    });
}

// ── API (delegates to Backend) ────────────────────────────────────────────────
function fetchTracksByGenres(genres) { return Backend.fetchTracksByGenres(genres); }
function fetchFallback()             { return Backend.fetchFallback(); }

// ── Search ────────────────────────────────────────────────────────────────────
function findMoodForGenres(genres) {
  var norm = (genres || []).map(function(g) { return g.toLowerCase().replace(/[^a-z0-9]/g, ''); });
  var best = MOODS[0], bestScore = -1;
  MOODS.forEach(function(mood) {
    var score = 0;
    mood.genres.forEach(function(mg) {
      var mn = mg.toLowerCase().replace(/[^a-z0-9]/g, '');
      norm.forEach(function(n) { if (n.indexOf(mn) !== -1 || mn.indexOf(n) !== -1) score++; });
    });
    if (score > bestScore) { bestScore = score; best = mood; }
  });
  return best;
}

function placeDotForMood(mood) {
  var wrap = document.getElementById('jmWheelWrap');
  var rect = wrap.getBoundingClientRect();
  var old = wrap.querySelectorAll('.jm-dot');
  for (var i = 0; i < old.length; i++) wrap.removeChild(old[i]);
  var dot = document.createElement('div');
  dot.className = 'jm-dot';
  dot.style.cssText = 'position:absolute;width:22px;height:22px;border-radius:50%;' +
    'transform:translate(-50%,-50%);pointer-events:none;' +
    'box-shadow:0 0 0 3px rgba(0,0,0,0.5),0 0 14px rgba(255,255,255,0.8);';
  dot.style.background = mood.col;
  dot.style.left = (mood.x * rect.width) + 'px';
  dot.style.top  = ((1 - mood.y) * rect.height) + 'px';
  wrap.appendChild(dot);
}

function highlightGenreBarForGenres(genres) {
  var norm = (genres || []).map(function(g) { return g.toLowerCase().replace(/[^a-z0-9]/g, ''); });
  var bestIdx = 0, bestScore = -1;
  GENRES.forEach(function(genre, i) {
    var score = 0;
    genre.genres.forEach(function(eg) {
      var en = eg.toLowerCase().replace(/[^a-z0-9]/g, '');
      norm.forEach(function(n) { if (n.indexOf(en) !== -1 || en.indexOf(n) !== -1) score++; });
    });
    if (score > bestScore) { bestScore = score; bestIdx = i; }
  });
  var n = GENRES.length;
  var hl = document.getElementById('jmGenreHighlight');
  hl.style.left  = (bestIdx / n * 100) + '%';
  hl.style.width = (1 / n * 100) + '%';
  hl.style.display = 'block';
  ['jmGenreLabelsTop', 'jmGenreLabels'].forEach(function(id) {
    document.getElementById(id).querySelectorAll('span').forEach(function(s, i) {
      s.style.color      = i === bestIdx ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.3)';
      s.style.fontWeight = i === bestIdx ? '700' : '400';
    });
  });
}

(function() {

  var suggest = document.getElementById('jmSuggest');

  input.addEventListener('input', function() {
    clearTimeout(timer);
    var q = input.value.trim();
    if (!q) { suggest.style.display = 'none'; return; }
    timer = setTimeout(function() { doSearch(q); }, 300);
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { suggest.style.display = 'none'; }, 150);
  });

  function doSearch(q) {
    Backend.searchTracks(q, 8)
      .then(function(items) { renderSuggestions(items); })
      .catch(function() {});
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderSuggestions(items) {
    suggest.innerHTML = '';
    if (!items.length) { suggest.style.display = 'none'; return; }
    items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'jm-sug-item';
      var label = Backend.trackLabel(item);
      var parts = label.split(' \u2014 ');
      var title  = parts.length > 1 ? parts.slice(1).join(' \u2014 ') : parts[0];
      var artist = parts.length > 1 ? parts[0] : '';
      div.innerHTML = '<div class="jm-sug-title">' + escHtml(title) + '</div>' +
        (artist ? '<div class="jm-sug-artist">' + escHtml(artist) + '</div>' : '');
      div.addEventListener('mousedown', function() { selectSong(item); });
      suggest.appendChild(div);
    });
    suggest.style.display = 'block';
  }

  function selectSong(item) {
    suggest.style.display = 'none';
    input.value = '';
    var genres = Backend.itemGenres(item);
    var mood = findMoodForGenres(genres);
    var _moodGenres = mood.genres;
    jmRefetchFn = function() { return fetchTracksByGenres(_moodGenres); };
    startPlayback([item]);
    placeDotForMood(mood);
    setMoodName(mood.name, mood.col);
    highlightGenreBarForGenres(genres);
    jmShowPrompt(false);
  }
})();

})();
</script>
</body>
</html>
