<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Musian</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#111; color:#fff; font-family:sans-serif; min-height:100vh;
       display:flex; align-items:center; justify-content:center; padding:24px; }
.card { width:100%; max-width:360px; }
h1 { font-size:1.8em; font-weight:300; letter-spacing:0.08em; text-align:center; margin-bottom:6px; }
.sub { text-align:center; font-size:0.85em; color:#888; margin-bottom:36px; }
label { display:block; font-size:0.78em; letter-spacing:0.1em; text-transform:uppercase; color:#888; margin-bottom:6px; }
input { width:100%; background:#1e1e1e; border:1px solid #333; border-radius:8px;
        color:#fff; font-size:0.95em; padding:12px 14px; margin-bottom:20px; outline:none; }
input:focus { border-color:#555; }
.type-row { display:flex; gap:8px; margin-bottom:20px; }
.type-btn { flex:1; padding:9px 4px; border:2px solid #333; border-radius:10px;
            background:none; color:#666; font-size:0.7em; font-weight:600;
            letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; line-height:1.4; }
.type-btn.active { border-color:#ccc; color:#fff; }
#jmDetectMsg { font-size:0.78em; color:#666; margin-bottom:16px; min-height:1.2em; text-align:center; }
button#jmSignIn { width:100%; padding:13px; border:none; border-radius:24px; background:#fff;
                  color:#111; font-size:0.95em; font-weight:700; cursor:pointer; letter-spacing:0.04em; }
button#jmSignIn:active { opacity:0.85; }
button#jmPlexBtn { width:100%; padding:13px; border:none; border-radius:24px;
                   background:#e5a00d; color:#fff; font-size:0.95em; font-weight:700;
                   cursor:pointer; letter-spacing:0.04em; display:none; }
button#jmPlexBtn:active { opacity:0.85; }
#jmPlexWait { display:none; text-align:center; font-size:0.82em; color:#888; margin-top:16px; line-height:1.8; }
#jmPlexWait a { color:#666; cursor:pointer; text-decoration:underline; }
#jmServerPicker { display:none; margin-top:4px; }
.srv-btn { width:100%; padding:12px 14px; margin-bottom:10px; border:1px solid #333;
           border-radius:10px; background:#1e1e1e; color:#fff; font-size:0.9em;
           text-align:left; cursor:pointer; }
.srv-btn:active { background:#2a2a2a; }
.srv-name { font-weight:600; }
.srv-url  { font-size:0.75em; color:#777; margin-top:2px; }
#jmError { margin-top:16px; text-align:center; font-size:0.82em; color:#f88; min-height:1.2em; }
#jmSpinner { display:none; text-align:center; margin-top:16px; font-size:0.82em; color:#888; }
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:32px;">
    <svg viewBox="0 0 400 400" width="120" height="120" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto 10px;filter:drop-shadow(0 0 20px rgba(0,0,0,0.8));">
      <defs>
        <radialGradient id="lgR" cx="0%" cy="0%" r="100%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#ff1a00" stop-opacity="0.65"/><stop offset="65%" stop-color="#ff1a00" stop-opacity="0"/></radialGradient>
        <radialGradient id="lgY" cx="100%" cy="0%" r="100%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#ffe800" stop-opacity="0.55"/><stop offset="65%" stop-color="#ffe800" stop-opacity="0"/></radialGradient>
        <radialGradient id="lgT" cx="100%" cy="100%" r="100%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#00e8c0" stop-opacity="0.55"/><stop offset="65%" stop-color="#00e8c0" stop-opacity="0"/></radialGradient>
        <clipPath id="lgC"><circle cx="200" cy="200" r="196"/></clipPath>
        <filter id="lgSG" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
          <feFlood flood-color="#000" flood-opacity="0.9"/><feComposite in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle cx="200" cy="200" r="196" fill="#000"/>
      <g clip-path="url(#lgC)">
        <rect width="400" height="400" fill="url(#lgR)"/>
        <rect width="400" height="400" fill="url(#lgY)" style="mix-blend-mode:screen"/>
        <rect width="400" height="400" fill="url(#lgT)" style="mix-blend-mode:screen"/>
      </g>
      <circle cx="200" cy="200" r="196" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
      <text x="200" y="262" font-family="'Pinyon Script', Georgia, serif" font-size="147" fill="white" fill-opacity="0.75" text-anchor="middle" filter="url(#lgSG)">M</text>
      <text x="204" y="318" font-family="sans-serif" font-size="22" font-weight="300" letter-spacing="16" fill="white" fill-opacity="0.48" text-anchor="middle">musian</text>
    </svg>
    <p style="font-size:0.72em;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin:0;">Connect to your music server</p>
  </div>

  <div id="jmServerUrlWrap">
    <label>Server URL</label>
    <input id="jmServer" type="url" placeholder="http://192.168.1.10:8096" value="http://"
           autocomplete="off" autocapitalize="none" spellcheck="false"/>
    <div id="jmDetectMsg"></div>
  </div>

  <div class="type-row">
    <button class="type-btn active" data-type="jellyfin">Jellyfin</button>
    <button class="type-btn" data-type="subsonic">Navidrome<br>Subsonic</button>
    <button class="type-btn" data-type="plex">Plex</button>
  </div>

  <div id="jmCredFields">
    <label>Username</label>
    <input id="jmUser" type="text" autocomplete="username" autocapitalize="none"/>
    <label>Password</label>
    <div style="position:relative;margin-bottom:20px;">
      <input id="jmPass" type="password" autocomplete="current-password" style="margin-bottom:0;padding-right:44px;width:100%;"/>
      <button type="button" id="jmTogglePass" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;font-size:1.1em;padding:4px;">&#128065;</button>
    </div>
    <button id="jmSignIn">Sign In</button>
  </div>

  <button id="jmPlexBtn">Sign in with Plex</button>

  <div id="jmPlexWait">
    Waiting for Plex sign-in&hellip;<br>
    <span style="font-size:0.9em;">(complete sign-in in the browser that just opened)</span><br>
    <a onclick="window.location.reload()">Cancel</a>
  </div>

  <div id="jmServerPicker">
    <label style="margin-bottom:12px;">Choose your Plex server</label>
  </div>

  <div id="jmError"></div>
  <div id="jmSpinner">Signing in…</div>
  <div style="margin-top:24px;font-size:0.65em;color:#444;text-align:center;">v3.1.6.0</div>
</div>

<script>
(function() {
  var selectedType = 'jellyfin';

  // Restore previous server/type
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem('jm_auth')); } catch(e) {}
  if (saved && saved.serverUrl) document.getElementById('jmServer').value = saved.serverUrl;
  if (saved && saved.type && saved.serverUrl) { window.location.replace('app.html'); return; }
  if (saved && saved.type) setType(saved.type);

  // Type selector
  document.querySelector('.type-row').addEventListener('click', function(e) {
    var btn = e.target.closest('.type-btn');
    if (btn) setType(btn.dataset.type);
  });

  function setType(type) {
    selectedType = type;
    document.querySelectorAll('.type-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.type === type);
    });
    var isPlex = type === 'plex';
    document.getElementById('jmServerUrlWrap').style.display = isPlex ? 'none' : 'block';
    document.getElementById('jmCredFields').style.display    = isPlex ? 'none' : 'block';
    document.getElementById('jmPlexBtn').style.display       = isPlex ? 'block' : 'none';
    document.getElementById('jmPlexWait').style.display      = 'none';
    document.getElementById('jmServerPicker').style.display  = 'none';
    document.getElementById('jmError').textContent = '';
  }

  // Select all on focus if only the default http:// is present
  document.getElementById('jmServer').addEventListener('focus', function() {
    if (this.value === 'http://') this.select();
  });

  // Auto-detect server type on URL blur
  document.getElementById('jmServer').addEventListener('blur', function() {
    var url = this.value.replace(/\/$/, '').trim();
    if (!url) return;
    detect(url);
  });

  function fetchQuick(url) {
    var ctrl = new AbortController();
    setTimeout(function() { ctrl.abort(); }, 4000);
    return fetch(url, { signal: ctrl.signal });
  }

  function detect(url) {
    var msg = document.getElementById('jmDetectMsg');
    msg.textContent = 'Detecting…';

    var jf = fetchQuick(url + '/System/Info')
      .then(function(r) { return r.json(); })
      .then(function(d) { return (d.ProductName || d.ServerName || '').toLowerCase().indexOf('jellyfin') !== -1 ? 'jellyfin' : null; })
      .catch(function() { return null; });

    var sub = fetchQuick(url + '/rest/ping.view?u=x&p=x&v=1.16.1&c=Musian&f=json')
      .then(function(r) { return r.json(); })
      .then(function(d) { return d['subsonic-response'] ? 'subsonic' : null; })
      .catch(function() { return null; });

    Promise.all([jf, sub]).then(function(r) {
      var found = r[0] || r[1];
      if (found) {
        setType(found);
        msg.textContent = 'Detected: ' + {jellyfin:'Jellyfin', subsonic:'Navidrome / Subsonic'}[found];
        msg.style.color = '#5c5';
      } else {
        msg.textContent = 'Could not detect — select server type above';
        msg.style.color = '#888';
      }
    });
  }

  // Password show/hide toggle
  document.getElementById('jmTogglePass').addEventListener('click', function() {
    var inp = document.getElementById('jmPass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // Jellyfin / Subsonic sign in
  document.getElementById('jmSignIn').addEventListener('click', signIn);
  document.getElementById('jmPass').addEventListener('keydown', function(e) { if (e.key === 'Enter') signIn(); });

  function showError(msg) {
    document.getElementById('jmSpinner').style.display = 'none';
    document.getElementById('jmSignIn').style.display = 'block';
    document.getElementById('jmError').textContent = msg;
  }

  function signIn() {
    var server = document.getElementById('jmServer').value.replace(/\/$/, '').trim();
    var user   = document.getElementById('jmUser').value.trim();
    var pass   = document.getElementById('jmPass').value;
    document.getElementById('jmError').textContent = '';
    if (!server) { showError('Please enter a server URL.'); return; }
    if (!user)   { showError('Please enter a username.'); return; }

    document.getElementById('jmSignIn').style.display = 'none';
    document.getElementById('jmSpinner').style.display = 'block';

    var p = selectedType === 'subsonic' ? signInSubsonic(server, user, pass)
          :                               signInJellyfin(server, user, pass);

    p.then(function(auth) {
      localStorage.setItem('jm_auth', JSON.stringify(auth));
      window.location.replace('app.html');
    }).catch(function(e) { showError(e.message || 'Sign in failed.'); });
  }

  // ── Plex PIN OAuth ───────────────────────────────────────────────────────────
  var PLEX_CLIENT_ID = 'musian-android';
  var PLEX_HEADERS = {
    'X-Plex-Client-Identifier': PLEX_CLIENT_ID,
    'X-Plex-Product': 'Musian',
    'Accept': 'application/json'
  };

  document.getElementById('jmPlexBtn').addEventListener('click', function() {
    document.getElementById('jmError').textContent = '';
    document.getElementById('jmPlexBtn').style.display = 'none';

    fetch('https://plex.tv/api/v2/pins?strong=true', { method:'POST', headers: PLEX_HEADERS })
      .then(function(r) { return r.json(); })
      .then(function(pin) {
        var authUrl = 'https://app.plex.tv/auth#?' +
          'clientID=' + PLEX_CLIENT_ID +
          '&code=' + pin.code +
          '&context%5Bdevice%5D%5Bproduct%5D=Musian';
        window.open(authUrl, '_system');
        document.getElementById('jmPlexWait').style.display = 'block';
        return pollPin(pin.id, 0);
      })
      .then(function(token) {
        document.getElementById('jmPlexWait').style.display = 'none';
        document.getElementById('jmSpinner').style.display = 'block';
        return fetchPlexServers(token);
      })
      .then(function(servers) {
        document.getElementById('jmSpinner').style.display = 'none';
        if (!servers.length) throw new Error('No Plex servers found on your account.');
        if (servers.length === 1) return connectToServer(servers[0]);
        showServerPicker(servers);
      })
      .catch(function(e) {
        document.getElementById('jmPlexWait').style.display = 'none';
        document.getElementById('jmSpinner').style.display = 'none';
        document.getElementById('jmServerPicker').style.display = 'none';
        document.getElementById('jmPlexBtn').style.display = 'block';
        document.getElementById('jmError').textContent = e.message || 'Plex sign-in failed.';
      });
  });

  function pollPin(id, attempt) {
    if (attempt > 150) throw new Error('Plex sign-in timed out — please try again.');
    return new Promise(function(res) { setTimeout(res, 2000); })
      .then(function() {
        return fetch('https://plex.tv/api/v2/pins/' + id, { headers: PLEX_HEADERS });
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.authToken) return d.authToken;
        return pollPin(id, attempt + 1);
      });
  }

  function fetchPlexServers(token) {
    var headers = Object.assign({}, PLEX_HEADERS, { 'X-Plex-Token': token });
    return fetch('https://plex.tv/api/v2/resources?includeHttps=1&includeRelay=1', { headers: headers })
      .then(function(r) { return r.json(); })
      .then(function(resources) {
        return (resources || [])
          .filter(function(r) { return r.provides && r.provides.indexOf('server') !== -1; })
          .map(function(r) {
            // Sort connections: local first, then remote, relay last
            var conns = (r.connections || []).slice().sort(function(a, b) {
              if (a.local && !b.local) return -1;
              if (!a.local && b.local) return 1;
              if (!a.relay && b.relay) return -1;
              if (a.relay && !b.relay) return 1;
              return 0;
            });
            return { name: r.name, token: token, connections: conns };
          });
      });
  }

  function showServerPicker(servers) {
    var picker = document.getElementById('jmServerPicker');
    // Clear previous buttons (keep the label)
    var label = picker.querySelector('label');
    picker.innerHTML = '';
    picker.appendChild(label);
    servers.forEach(function(srv) {
      var btn = document.createElement('button');
      btn.className = 'srv-btn';
      btn.innerHTML = '<div class="srv-name">' + escHtml(srv.name) + '</div>' +
        '<div class="srv-url">' + escHtml((srv.connections[0] || {}).uri || '') + '</div>';
      btn.addEventListener('click', function() {
        picker.style.display = 'none';
        document.getElementById('jmSpinner').style.display = 'block';
        connectToServer(srv).catch(function(e) {
          document.getElementById('jmSpinner').style.display = 'none';
          document.getElementById('jmPlexBtn').style.display = 'block';
          document.getElementById('jmError').textContent = e.message || 'Could not connect.';
        });
      });
      picker.appendChild(btn);
    });
    picker.style.display = 'block';
  }

  function connectToServer(srv) {
    // Try connections in order until one works
    var conns = srv.connections;
    function tryNext(i) {
      if (i >= conns.length) throw new Error('Could not reach Plex server — check your network.');
      var uri = conns[i].uri;
      return fetch(uri + '/library/sections?X-Plex-Token=' + srv.token, {
        headers: { 'Accept': 'application/json' }
      }).then(function(r) {
        if (!r.ok) throw new Error('bad');
        return r.json();
      }).then(function(d) {
        var sections = (d.MediaContainer && d.MediaContainer.Directory) || [];
        var music = sections.filter(function(s) { return s.type === 'artist'; });
        if (!music.length) throw new Error('No music library found on "' + srv.name + '".');
        var auth = { type:'plex', serverUrl: uri, token: srv.token, sectionId: music[0].key };
        localStorage.setItem('jm_auth', JSON.stringify(auth));
        window.location.replace('app.html');
      }).catch(function(e) {
        if (e.message !== 'bad' && e.message.indexOf('music library') !== -1) throw e;
        return tryNext(i + 1);
      });
    }
    return tryNext(0);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function signInJellyfin(server, user, pass) {
    return fetch(server + '/Users/AuthenticateByName', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Emby-Authorization': 'MediaBrowser Client="Musian",Device="Musian",DeviceId="jm1",Version="1.0"'
      },
      body: JSON.stringify({ Username: user, Pw: pass })
    }).then(function(r) {
      if (r.status === 401) throw new Error('Wrong username or password.');
      if (!r.ok) throw new Error('Server error (' + r.status + ').');
      return r.json();
    }).then(function(d) {
      return { type:'jellyfin', serverUrl:server, accessToken:d.AccessToken, userId:d.User.Id };
    });
  }

  function signInSubsonic(server, user, pass) {
    var url = server + '/rest/ping.view?u=' + encodeURIComponent(user) +
              '&p=' + encodeURIComponent(pass) + '&v=1.16.1&c=Musian&f=json';
    return fetch(url).then(function(r) { return r.json(); }).then(function(d) {
      var resp = d['subsonic-response'];
      if (!resp) throw new Error('Not a Subsonic-compatible server.');
      if (resp.status !== 'ok') {
        var msg = resp.error && resp.error.message ? resp.error.message : 'Wrong username or password.';
        throw new Error(msg);
      }
      return { type:'subsonic', serverUrl:server, username:user, password:pass };
    });
  }
})();
</script>
</body>
</html>
