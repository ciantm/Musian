<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#111; color:#fff; font-family:sans-serif; min-height:100vh; overflow-x:hidden; }
#jmApp { display:flex; flex-direction:column; align-items:center; padding:24px 16px 48px; width:100%; }
#jmEraArea { width:100%; max-width:min(80vw,420px); margin-top:18px; }
#jmWheelPrompt { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:2;transition:opacity 0.4s; }
#jmMoodName { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72%;text-align:center;pointer-events:none;z-index:3;transition:opacity 0.4s;font-size:1.2em;font-weight:300;letter-spacing:0.08em;text-shadow:0 0 32px #000,0 0 12px #000;opacity:0; }
#jmEraWrap { position:relative; width:100%; touch-action:none; cursor:pointer; }
#jmEraBar { width:100%; height:44px; border-radius:10px; background:linear-gradient(to right,#c8b860,#1a5070,#6a7840,#b040a0,#c06020,#b02010,#806000,#200010); }
#jmEraHighlight { position:absolute; top:0; height:44px; border-radius:10px; background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.7); pointer-events:none; transition:left 0.15s,width 0.15s; display:none; }
#jmEraLabelsTop, #jmEraLabels { display:flex; width:100%; }
#jmEraLabelsTop { margin-bottom:4px; }
#jmEraLabels { margin-top:4px; }
#jmEraLabelsTop span, #jmEraLabels span { flex:1; text-align:center; font-size:0.58em; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:rgba(255,255,255,0.5); }
#jmPlayer { margin-top:16px; text-align:center; width:100%; max-width:420px; }
.jm-btn { padding:10px 28px; border:none; border-radius:24px; font-size:0.9em; font-weight:700; cursor:pointer; color:#fff; }
#jmSkipBtn { background:rgba(255,255,255,0.12); margin-right:8px; }
#jmStopBtn { background:rgba(255,255,255,0.08); }
#jmSearch { width:100%; background:#1e1e1e; border:1px solid #333; border-radius:20px;
            color:#fff; font-size:0.85em; padding:9px 16px; outline:none; }
#jmSearch:focus { border-color:#555; }
#jmSuggest { position:absolute; top:calc(100% + 4px); left:0; right:0;
             background:#1e1e1e; border:1px solid #333; border-radius:10px;
             overflow:hidden; z-index:10; display:none; }
.jm-sug-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid #222; text-align:left; }
.jm-sug-item:last-child { border-bottom:none; }
.jm-sug-item:hover, .jm-sug-item:active { background:#2a2a2a; }
.jm-sug-title { font-size:0.85em; color:#fff; }
.jm-sug-artist { font-size:0.75em; color:#888; margin-top:2px; }

<script>
var JM = {
  server: window.location.origin,
  token: null,
  userId: null,
  init: function() {
    try {
      var keys = Object.keys(localStorage);
      for (var i = 0; i < keys.length; i++) {
        try {
          var raw = localStorage.getItem(keys[i]);
          if (!raw || raw[0] !== '{') continue;
          var val = JSON.parse(raw);
          if (val && val.Servers && val.Servers[0] && val.Servers[0].AccessToken) {
            this.token = val.Servers[0].AccessToken;
            this.userId = val.Servers[0].UserId;
            break;
          }
          if (val && val.AccessToken && val.User) {
            this.token = val.AccessToken;
            this.userId = val.User.Id;
            break;
          }
        } catch(e) {}
      }
      var p = new URLSearchParams(window.location.search);
      if (p.get('token'))  this.token  = p.get('token');
      if (p.get('userId')) this.userId = p.get('userId');
    } catch(e) {}
  },
  headers: function() {
    return { 'X-Emby-Authorization':
      'MediaBrowser Client="Musian",Device="Browser",DeviceId="jm1",Version="1.0"' +
      (this.token ? ',Token="' + this.token + '"' : '') };
  },
  streamUrl: function(itemId) {
    return this.server + '/Audio/' + itemId + '/universal' +
      '?UserId=' + this.userId +
      '&DeviceId=jm1' +
      '&MaxStreamingBitrate=140000000' +
      '&Container=mp3,aac,m4a,flac,ogg,opus,webma,webm,wav' +
      '&AudioCodec=aac,mp3,flac,opus,vorbis' +
      '&TranscodingContainer=mp3' +
      '&TranscodingProtocol=http' +
      '&api_key=' + this.token;
  }
};
JM.init();
var jmGenreCache = null;
if (JM.token) {
  fetch(JM.server + '/Genres?' + new URLSearchParams({
    IncludeItemTypes:'Audio', Recursive:'true', Limit:'500'
  }), {headers: JM.headers()})
  .then(function(r){ return r.json(); })
  .then(function(d){ jmGenreCache = (d.Items||[]).map(function(g){ return g.Name; }); })
  .catch(function(){});
}
if (!JM.token) {
  document.getElementById('jmStatus').textContent = 'Not signed in — please log into Jellyfin first.';
  document.getElementById('jmStatus').style.color = '#f88';
} else {
  fetch(JM.server + '/Users/' + JM.userId + '/Items?' +
    new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', Limit:'1'}),
    {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var n = d.TotalRecordCount;
      if (n === 0 || n === undefined) {
        document.getElementById('jmStatus').textContent = 'Library has 0 audio tracks — check Jellyfin media libraries.';
        document.getElementById('jmStatus').style.color = '#f88';
      } else {
        document.getElementById('jmStatus').textContent = n + ' audio tracks in library';
      }
    })
    .catch(function() {
      document.getElementById('jmStatus').textContent = 'Could not reach Jellyfin API.';
      document.getElementById('jmStatus').style.color = '#f88';
    });
}

  var labelsEl     = document.getElementById('jmEraLabels');
  var n            = ERAS.length;

  // Build staggered labels: even indices above bar, odd indices below
  ERAS.forEach(function(era, i) {
    var top = document.createElement('span');
    var bot = document.createElement('span');
    if (i % 2 === 0) {
      top.textContent = era.name;

    var hi = idx;

    // Position highlight over selected range
    var leftPct  = (lo / n) * 100;
    var widthPct = ((hi - lo + 1) / n) * 100;
    highlight.style.left    = leftPct + '%';
    highlight.style.width   = widthPct + '%';
    highlight.style.display = 'block';

    // Dim non-selected labels, brighten selected (both rows)
    [labelsTopEl, labelsEl].forEach(function(row) {
      row.querySelectorAll('span').forEach(function(s, i) {
        var active = (i >= lo && i <= hi);
        s.style.color = active ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.3)';
        s.style.fontWeight = active ? '700' : '400';
      });
    });

    // Set genre filter
    var genreMap = {};
    selected.forEach(function(e) { e.genres.forEach(function(g) { genreMap[g] = true; }); });
    jmEraGenres = Object.keys(genreMap);

    // Replay with new genre filter only if a mood was already selected
    if (jmMoodGenres !== null) {
      setStatus('Searching\u2026');
      setTrackCount(0);
      var eraG = jmEraGenres, moodG = jmMoodGenres;
      jmRefetchFn = function() { return fetchTracksByGenres(eraG); };
      fetchTracksByGenres(eraG)
        .then(function(items) { return items.length > 0 ? items : fetchTracksByGenres(moodG); })
        .then(function(items) { return items.length > 0 ? items : fetchFallback(); })
        .then(function(items) {
          setTrackCount(items.length);
          if (!items.length) { setStatus('No tracks found.'); return; }
          startPlayback(items);
        })
        .catch(function() { setStatus('Could not fetch tracks.'); });
    }
  }

  wrap.addEventListener('click', function(e) { handleEraInteraction(e.clientX); });
  wrap.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleEraInteraction(e.changedTouches[0].clientX);
  });
})();

// ── Player ──────────────────────────────────────────────────────────────
var jmPlaylist   = [];
var jmPlayIdx    = 0;
var jmGeneration = 0;
var jmMoodGenres = null; // set when a mood is tapped, null until then
var jmAudio      = document.getElementById('jmAudio');
var jmRefetchFn  = null;  // zero-arg fn returning Promise of next batch
var jmPlayedIds  = [];    // ids of tracks already played (for dedup)
var jmFetching   = false; // prevents concurrent background fetches

function jmShowPrompt(visible) {
  var p = document.getElementById('jmWheelPrompt');
  if (!p) return;
  if (visible) { p.style.display = 'block'; setTimeout(function(){ p.style.opacity = '1'; }, 10); }
  else { p.style.opacity = '0'; setTimeout(function(){ p.style.display = 'none'; }, 400); }
}

function jmAdvance(gen) {
  return function() {
    if (gen !== jmGeneration) return;
    jmPlayIdx++;
    jmPlayTrack(jmPlayIdx, gen);
  };
}

function jmUpdateMediaSession(item) {
  if (!('mediaSession' in navigator)) return;
  var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  item.Name  || 'Musian',
    artist: artist,
    album:  item.Album || '',
  });
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.setActionHandler('play', function() {
    jmAudio.play().catch(function() {});
    navigator.mediaSession.playbackState = 'playing';
  });
  navigator.mediaSession.setActionHandler('pause', function() {
    jmAudio.pause();
    navigator.mediaSession.playbackState = 'paused';
  });
  navigator.mediaSession.setActionHandler('nexttrack', function() {
    jmPlayIdx++; jmPlayTrack(jmPlayIdx, jmGeneration);
  });
  navigator.mediaSession.setActionHandler('previoustrack', function() {
    jmPlayIdx = Math.max(0, jmPlayIdx - 1);
    jmPlayTrack(jmPlayIdx, jmGeneration);
  });
  navigator.mediaSession.setActionHandler('stop', function() {
    document.getElementById('jmStopBtn').click();
  });
}

// Resume audio if the browser paused it when the screen locked
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && jmPlaylist.length > 0 && jmAudio.paused && !jmAudio.ended) {
    jmAudio.play().catch(function() {});
  }
});

function jmUpdatePersistentBar(item) {
  var bar = document.getElementById('jmPersistentPlay');
  var btn = document.getElementById('jmPersistentPlayBtn');
  var lbl = document.getElementById('jmPersistentTrack');
  if (!bar) return;
  if (item) {
    var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
    lbl.textContent = (artist ? artist + ' \u2014 ' : '') + (item.Name || '');
  }
  bar.style.display = 'flex';
  btn.innerHTML = jmAudio.paused ? '&#9654;' : '&#9646;&#9646;';
}

function jmHidePersistentBar() {
  var bar = document.getElementById('jmPersistentPlay');
  if (bar) bar.style.display = 'none';
}

function jmPlayTrack(idx, gen) {
  if (gen !== jmGeneration) return;
  if (idx >= jmPlaylist.length) {
    setStatus('Playlist ended — tap the wheel to play again.');
    document.getElementById('jmSearch').placeholder = 'Search song\u2026';
    document.getElementById('jmControls').style.display = 'none';
    document.getElementById('jmUpNext').style.display = 'none';
    if ('mediaSession' in navigator) { navigator.mediaSession.metadata = null; navigator.mediaSession.playbackState = 'none'; }
    jmHidePersistentBar();
    return;
  }
  var item = jmPlaylist[idx];
  jmPlayedIds.push(item.Id);
  // Prefetch next batch when 2 or fewer tracks remain (including current)
  if (jmRefetchFn && !jmFetching && jmPlaylist.length - idx <= 2) {
    jmFetching = true;
    var _gen = gen;
    jmRefetchFn().then(function(more) {
      jmFetching = false;
      if (_gen !== jmGeneration) return;
      more = more.filter(function(t) { return jmPlayedIds.indexOf(t.Id) === -1; });
      if (more.length) jmPlaylist = jmPlaylist.concat(more);
    }).catch(function() { jmFetching = false; });
  }
  jmAudio.pause();
  jmAudio.src = JM.streamUrl(item.Id);
  jmAudio.play().catch(function() {});
  var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
  document.getElementById('jmSearch').placeholder = (artist ? artist + ' \u2014 ' : '') + item.Name;
  document.getElementById('jmControls').style.display = 'block';
  var next = jmPlaylist[idx + 1];
  var upNextEl = document.getElementById('jmUpNext');
  if (next) {
    var na = (next.Artists && next.Artists[0]) || next.AlbumArtist || '';
    upNextEl.textContent = 'Up next \u00b7 ' + (na ? na + ' \u2014 ' : '') + next.Name;
    upNextEl.style.display = 'block';
  } else {
    upNextEl.style.display = 'none';
  }
  setStatus('Playing \u266a');
  jmUpdateMediaSession(item);
  jmUpdatePersistentBar(item);
}

function attachPlayerListeners(gen) {
  jmAudio.addEventListener('ended', jmAdvance(gen));
  jmAudio.addEventListener('error', function() {
    if (gen !== jmGeneration) return;
    var code = jmAudio.error ? jmAudio.error.code : '?';
    var msg  = jmAudio.error ? jmAudio.error.message : '';
    setStatus('Track error (code ' + code + (msg ? ': ' + msg : '') + ') — skipping\u2026');
    jmPlayIdx++;
    jmPlayTrack(jmPlayIdx, gen);
  });
}

document.getElementById('jmSkipBtn').addEventListener('click', function() {
  jmPlayIdx++;
  jmPlayTrack(jmPlayIdx, jmGeneration);
});
document.getElementById('jmStopBtn').addEventListener('click', function() {
  jmGeneration++;
  jmAudio.pause(); jmAudio.src = '';
  jmPlaylist = [];
  document.getElementById('jmSearch').placeholder = 'Search song\u2026';
  document.getElementById('jmControls').style.display = 'none';
  document.getElementById('jmUpNext').style.display = 'none';
  setStatus(''); setTrackCount(0); setMoodName('', '');
  if ('mediaSession' in navigator) { navigator.mediaSession.metadata = null; navigator.mediaSession.playbackState = 'none'; }
  jmHidePersistentBar();
  // Clear mood and era state
  jmMoodGenres = null;
  jmEraGenres = null;
  jmRefetchFn = null;
  jmPlayedIds = [];
  jmShowPrompt(true);
  var hl = document.getElementById('jmEraHighlight');
  if (hl) hl.style.display = 'none';
  ['jmEraLabelsTop','jmEraLabels'].forEach(function(id) {
    document.getElementById(id).querySelectorAll('span').forEach(function(s) {
      s.style.color = ''; s.style.fontWeight = '';
    });
  });
});

document.getElementById('jmPersistentPlayBtn').addEventListener('click', function() {
  if (jmPlaylist.length > 0) {
    if (jmAudio.paused) { jmAudio.play().catch(function() {}); }
    else { jmAudio.pause(); }
  }
});
document.getElementById('jmPersistentSkipBtn').addEventListener('click', function() {
  jmPlayIdx++;
  jmPlayTrack(jmPlayIdx, jmGeneration);
});
jmAudio.addEventListener('play',  function() { jmUpdatePersistentBar(null); });
jmAudio.addEventListener('pause', function() { jmUpdatePersistentBar(null); });

function startPlayback(items) {
  jmGeneration++;
  jmAudio.pause();
  jmPlaylist = items; jmPlayIdx = 0;
  jmPlayedIds = []; jmFetching = false;
  attachPlayerListeners(jmGeneration);
  jmPlayTrack(0, jmGeneration);
}

// ── Mood logic ───────────────────────────────────────────────────────────
function getNearestMoods(vx, vy, count) {
  return MOODS.slice().sort(function(a, b) {
    var da = (vx-a.x)*(vx-a.x) + (vy-a.y)*(vy-a.y);
    var db = (vx-b.x)*(vx-b.x) + (vy-b.y)*(vy-b.y);
    return da - db;
  }).slice(0, count);
}

function handleInteraction(clientX, clientY) {
  var wrap = document.getElementById('jmWheelWrap');
  var rect = wrap.getBoundingClientRect();
  var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2, r = rect.width/2;
  var dx = clientX - cx, dy = clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) > r) return;

  var valence = (dx/r)*0.5 + 0.5;
  var arousal  = (-dy/r)*0.5 + 0.5;

  var nearest = getNearestMoods(valence, arousal, 4);
  var nearest1 = nearest[0];

  // Show dot
  var old = wrap.querySelectorAll('.jm-dot');
  for (var i = 0; i < old.length; i++) wrap.removeChild(old[i]);
  var dot = document.createElement('div');
  dot.className = 'jm-dot';
  dot.style.cssText = 'position:absolute;width:22px;height:22px;border-radius:50%;' +
    'transform:translate(-50%,-50%);pointer-events:none;' +
    'box-shadow:0 0 0 3px rgba(0,0,0,0.5),0 0 14px rgba(255,255,255,0.8);';
  dot.style.background = nearest1.col;
  dot.style.left = (clientX - rect.left) + 'px';
  dot.style.top  = (clientY - rect.top)  + 'px';
  wrap.appendChild(dot);

  jmShowPrompt(false);
  setTrackCount(0);

  // Floating mood name animation — one per quadrant, successively
  var old2 = wrap.querySelectorAll('.jm-mlabel');
  for (var j = 0; j < old2.length; j++) wrap.removeChild(old2[j]);
  var QPOS = [{qx:0.27,qy:0.30},{qx:0.73,qy:0.30},{qx:0.27,qy:0.70},{qx:0.73,qy:0.70}];
  nearest.forEach(function(m, idx) {
    var q = (m.x < 0.5 ? 0 : 1) + (m.y >= 0.5 ? 0 : 2);
    var lx = QPOS[q].qx * rect.width;
    var ly = QPOS[q].qy * rect.height;
    var delay = idx * 1300;
    (function(mood, elx, ely, d) {
      var el = document.createElement('div');
      el.className = 'jm-mlabel';
      el.textContent = mood.name;
      el.style.cssText = 'position:absolute;pointer-events:none;font-size:0.68em;font-weight:600;' +
        'letter-spacing:0.1em;text-transform:uppercase;color:' + mood.col + ';' +
        'text-shadow:0 0 12px #000,0 0 4px #000;transform:translate(-50%,-50%);' +
        'transition:opacity 0.8s;opacity:0;white-space:nowrap;';
      el.style.left = elx + 'px';
      el.style.top  = ely + 'px';
      wrap.appendChild(el);
      setTimeout(function() { el.style.opacity = '0.9'; }, d + 30);
      setTimeout(function() { el.style.opacity = '0'; }, d + 960);
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, d + 1840);
    }(m, lx, ly, delay));
  });

  // Combine genres from the 3 nearest moods
  var genreMap = {};
  nearest.forEach(function(m) { m.genres.forEach(function(g) { genreMap[g] = true; }); });
  var genres = Object.keys(genreMap);
  jmMoodGenres = genres; // remember for when genre zone changes

  // If a genre zone is selected, use it as the search filter (overrides mood genres)
  var moodGenres = genres;
  if (jmEraGenres !== null) genres = jmEraGenres;

  setStatus('Searching\u2026');

  // Capture refetch context before async
  var _refetchGenres = genres;
  jmRefetchFn = function() { return fetchTracksByGenres(_refetchGenres); };

  fetchTracksByGenres(genres)
    .then(function(items) {
      if (items.length > 0) return items;
      // Era zone selected but no matches — fall back to mood genres
      if (jmEraGenres !== null && moodGenres.length > 0) return fetchTracksByGenres(moodGenres);
      // No era zone — fall back to random
      return fetchFallback();
    })
    .then(function(items) {
      setTrackCount(items.length);
      if (!items.length) { setStatus('No tracks found — check genre tags in your library.'); return; }
      startPlayback(items);
    })
    .catch(function(e) {
      console.error('[Musian]', e);
      setStatus('Could not fetch tracks.');
    });
}

var svg = document.getElementById('jmSvgWheel');
svg.addEventListener('click',    function(e) { handleInteraction(e.clientX, e.clientY); });
svg.addEventListener('touchend', function(e) { e.preventDefault(); var t = e.changedTouches[0]; handleInteraction(t.clientX, t.clientY); });

// ── UI helpers ────────────────────────────────────────────────────────────
function setStatus(t)    { document.getElementById('jmStatus').textContent = t; }
function setMoodName(t, col) { var el = document.getElementById('jmMoodName'); el.textContent = t; el.style.color = col || '#fff'; el.style.opacity = t ? '1' : '0'; }
function setTrackCount(n){ var el = document.getElementById('jmTrackCount'); el.style.display = n > 0 ? 'block' : 'none'; el.textContent = n > 0 ? n + ' tracks found' : ''; }

// ── API ───────────────────────────────────────────────────────────────────
function expandGenres(seeds) {
  if (!jmGenreCache || !jmGenreCache.length) return seeds;
  var result = {};
  seeds.forEach(function(seed) {
    result[seed] = true;
    var sn = seed.toLowerCase().replace(/[^a-z0-9]/g, '');
    jmGenreCache.forEach(function(g) {
      if (g.toLowerCase().replace(/[^a-z0-9]/g, '').indexOf(sn) !== -1) result[g] = true;
    });
  });
  return Object.keys(result);
}

function fetchTracksByGenres(genres) {
  if (!JM.token || !JM.userId) return Promise.resolve([]);
  var expanded = expandGenres(genres);
  var params = new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', SortBy:'Random', Limit:'10', Fields:'Genres,MediaSources'});
  if (expanded.length > 0) params.set('Genres', expanded.join('|'));
  return fetch(JM.server + '/Users/' + JM.userId + '/Items?' + params, {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.Items || []; });
}

function fetchFallback() {
  if (!JM.token || !JM.userId) return Promise.resolve([]);
  return fetch(JM.server + '/Users/' + JM.userId + '/Items?' +
    new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', SortBy:'Random', Limit:'10'}),
    {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.Items || []; });
}

// ── Search ────────────────────────────────────────────────────────────────────
function findMoodForGenres(genres) {
  var norm = (genres || []).map(function(g) { return g.toLowerCase().replace(/[^a-z0-9]/g, ''); });
  var best = MOODS[0], bestScore = -1;
  MOODS.forEach(function(mood) {
    var score = 0;
    mood.genres.forEach(function(mg) {
      var mn = mg.toLowerCase().replace(/[^a-z0-9]/g, '');
      norm.forEach(function(n) { if (n.indexOf(mn) !== -1 || mn.indexOf(n) !== -1) score++; });
    });
    if (score > bestScore) { bestScore = score; best = mood; }
  });
  return best;
}

function placeDotForMood(mood) {
  var wrap = document.getElementById('jmWheelWrap');
  var rect = wrap.getBoundingClientRect();
  var old = wrap.querySelectorAll('.jm-dot');
  for (var i = 0; i < old.length; i++) wrap.removeChild(old[i]);
  var dot = document.createElement('div');
  dot.className = 'jm-dot';
  dot.style.cssText = 'position:absolute;width:22px;height:22px;border-radius:50%;' +
    'transform:translate(-50%,-50%);pointer-events:none;' +
    'box-shadow:0 0 0 3px rgba(0,0,0,0.5),0 0 14px rgba(255,255,255,0.8);';
  dot.style.background = mood.col;
  dot.style.left = (mood.x * rect.width) + 'px';
  dot.style.top  = ((1 - mood.y) * rect.height) + 'px';
  wrap.appendChild(dot);
}

function highlightGenreBarForGenres(genres) {
  var norm = (genres || []).map(function(g) { return g.toLowerCase().replace(/[^a-z0-9]/g, ''); });
  var bestIdx = 0, bestScore = -1;
  ERAS.forEach(function(era, i) {
    var score = 0;
    era.genres.forEach(function(eg) {
      var en = eg.toLowerCase().replace(/[^a-z0-9]/g, '');
      norm.forEach(function(n) { if (n.indexOf(en) !== -1 || en.indexOf(n) !== -1) score++; });
    });
    if (score > bestScore) { bestScore = score; bestIdx = i; }
  });
  var n = ERAS.length;
  var hl = document.getElementById('jmEraHighlight');
  hl.style.left  = (bestIdx / n * 100) + '%';
  hl.style.width = (1 / n * 100) + '%';
  hl.style.display = 'block';
  ['jmEraLabelsTop', 'jmEraLabels'].forEach(function(id) {
    document.getElementById(id).querySelectorAll('span').forEach(function(s, i) {
      s.style.color      = i === bestIdx ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.3)';
      s.style.fontWeight = i === bestIdx ? '700' : '400';
    });
  });
}

(function() {
  var input   = document.getElementById('jmSearch');
  var suggest = document.getElementById('jmSuggest');
  var timer   = null;

  input.addEventListener('input', function() {
    clearTimeout(timer);
    var q = input.value.trim();
    if (!q) { suggest.style.display = 'none'; return; }
    timer = setTimeout(function() { doSearch(q); }, 300);
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { suggest.style.display = 'none'; }, 150);
  });

  function doSearch(q) {
    if (!JM.token || !JM.userId) return;
    fetch(JM.server + '/Users/' + JM.userId + '/Items?' + new URLSearchParams({
      SearchTerm: q, IncludeItemTypes: 'Audio', Recursive: 'true',
      Limit: '8', Fields: 'Genres,Artists,AlbumArtist'
    }), {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { renderSuggestions(d.Items || []); })
    .catch(function() {});
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderSuggestions(items) {
    suggest.innerHTML = '';
    if (!items.length) { suggest.style.display = 'none'; return; }
    items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'jm-sug-item';
      var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
      div.innerHTML = '<div class="jm-sug-title">' + escHtml(item.Name) + '</div>' +
        (artist ? '<div class="jm-sug-artist">' + escHtml(artist) + '</div>' : '');
      div.addEventListener('mousedown', function() { selectSong(item); });
      suggest.appendChild(div);
    });
    suggest.style.display = 'block';
  }

  function selectSong(item) {
    suggest.style.display = 'none';
    input.value = '';
    var genres = item.Genres || [];
    var mood = findMoodForGenres(genres);
    var _moodGenres = mood.genres;
    jmRefetchFn = function() { return fetchTracksByGenres(_moodGenres); };
    startPlayback([item]);
    placeDotForMood(mood);
    setMoodName(mood.name, mood.col);
    highlightGenreBarForGenres(genres);
    jmShowPrompt(false);
  }
})();

})();
</script>
