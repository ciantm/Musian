<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Musian</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#111; color:#fff; font-family:sans-serif; min-height:100vh; overflow-x:hidden; }
#jmApp { display:flex; flex-direction:column; align-items:center; padding:24px 16px 48px; width:100%; }
#jmEraArea { width:100%; max-width:min(80vw,420px); margin-top:18px; }
#jmWheelPrompt { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:2;transition:opacity 0.4s; }
#jmMoodName { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72%;text-align:center;pointer-events:none;z-index:3;transition:opacity 0.4s;font-size:1.2em;font-weight:300;letter-spacing:0.08em;text-shadow:0 0 32px #000,0 0 12px #000;opacity:0; }
#jmEraWrap { position:relative; width:100%; touch-action:none; cursor:pointer; }
#jmEraBar { width:100%; height:44px; border-radius:10px; background:linear-gradient(to right,#c8b860,#1a5070,#6a7840,#b040a0,#c06020,#b02010,#806000,#200010); }
#jmEraHighlight { position:absolute; top:0; height:44px; border-radius:10px; background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.7); pointer-events:none; transition:left 0.15s,width 0.15s; display:none; }
#jmEraDot { position:absolute; top:50%; width:12px; height:12px; border-radius:50%; transform:translate(-50%,-50%); background:#fff; box-shadow:0 0 0 2px rgba(0,0,0,0.5),0 0 8px rgba(255,255,255,0.9); pointer-events:none; transition:left 0.35s ease; display:none; }
#jmEraLabelsTop, #jmEraLabels { display:flex; width:100%; }
#jmEraLabelsTop { margin-bottom:4px; }
#jmEraLabels { margin-top:4px; }
#jmEraLabelsTop span, #jmEraLabels span { flex:1; text-align:center; font-size:0.58em; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:rgba(255,255,255,0.5); }
#jmPlayer { margin-top:16px; text-align:center; width:100%; max-width:420px; }
.jm-btn { padding:10px 18px; border:none; border-radius:24px; font-size:0.9em; font-weight:700; cursor:pointer; color:rgba(255,255,255,0.5); }
#jmBackBtn  { background:rgba(255,255,255,0.07); margin-right:8px; }
#jmPauseBtn { background:rgba(255,255,255,0.07); margin-right:8px; }
#jmSkipBtn  { background:rgba(255,255,255,0.07); margin-right:8px; }
#jmStopBtn  { background:rgba(255,255,255,0.04); }
#jmSearch { width:100%; background:#1e1e1e; border:1px solid #333; border-radius:20px;
            color:#fff; font-size:0.85em; padding:9px 16px; outline:none; }
#jmSearch:focus { border-color:#555; }
#jmSuggest { position:absolute; top:calc(100% + 4px); left:0; right:0;
             background:#1e1e1e; border:1px solid #333; border-radius:10px;
             overflow:hidden; z-index:10; display:none; }
.jm-sug-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid #222; text-align:left; }
.jm-sug-item:last-child { border-bottom:none; }
.jm-sug-item:hover, .jm-sug-item:active { background:#2a2a2a; }
.jm-sug-title { font-size:0.85em; color:#fff; }
.jm-sug-artist { font-size:0.75em; color:#888; margin-top:2px; }
#jmSplash { position:fixed; inset:0; background:#111; display:flex; flex-direction:column; align-items:center; padding:24px 16px 0; z-index:999; transition:opacity 0.8s ease; }
#jmSplash.fade { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="jmSplash">
  <h2 style="font-size:1.92em;font-weight:300;margin:0 0 32px;visibility:hidden;" aria-hidden="true"><span style="font-family:'Pinyon Script',Georgia,serif;font-size:1.15em;font-weight:400;">Musian</span></h2>
  <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="display:block;width:min(80vw,420px);height:min(80vw,420px);filter:drop-shadow(0 0 40px rgba(0,0,0,0.9));">
    <defs>
      <radialGradient id="spR" cx="0%" cy="0%" r="100%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#ff1a00" stop-opacity="0.65"/><stop offset="65%" stop-color="#ff1a00" stop-opacity="0"/></radialGradient>
      <radialGradient id="spY" cx="100%" cy="0%" r="100%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#ffe800" stop-opacity="0.55"/><stop offset="65%" stop-color="#ffe800" stop-opacity="0"/></radialGradient>
      <radialGradient id="spT" cx="100%" cy="100%" r="100%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#00e8c0" stop-opacity="0.55"/><stop offset="65%" stop-color="#00e8c0" stop-opacity="0"/></radialGradient>
      <clipPath id="spC"><circle cx="200" cy="200" r="196"/></clipPath>
      <filter id="spSG" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
        <feFlood flood-color="#000" flood-opacity="0.9"/><feComposite in2="blur" operator="in" result="shadow"/>
        <feMerge><feMergeNode in="shadow"/><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="200" cy="200" r="196" fill="#000"/>
    <g clip-path="url(#spC)">
      <rect width="400" height="400" fill="url(#spR)"/>
      <rect width="400" height="400" fill="url(#spY)" style="mix-blend-mode:screen"/>
      <rect width="400" height="400" fill="url(#spT)" style="mix-blend-mode:screen"/>
    </g>
    <circle cx="200" cy="200" r="196" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <text x="200" y="262" font-family="'Pinyon Script', Georgia, serif" font-size="147" fill="white" fill-opacity="0.75" text-anchor="middle" filter="url(#spSG)">M</text>
    <text x="204" y="318" font-family="sans-serif" font-size="22" font-weight="300" letter-spacing="16" fill="white" fill-opacity="0.48" text-anchor="middle">musian</text>
  </svg>
</div>

  <h2 style="font-size:1.92em;font-weight:300;margin:0 0 32px;text-align:center;"><span style="font-family:'Pinyon Script',Georgia,serif;font-size:1.15em;font-weight:400;letter-spacing:0;color:rgba(255,255,255,0.88);">Musian</span></h2>

        </radialGradient>
        <radialGradient id="gYellow" cx="100%" cy="0%" r="100%" gradientUnits="objectBoundingBox">

          <stop offset="70%" stop-color="#ffe800" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gTeal" cx="100%" cy="100%" r="100%" gradientUnits="objectBoundingBox">

        <path id="jmArcTR" d="M 231,25 A 178,178 0 0,1 375,169"/>
        <path id="jmArcTL" d="M 25,169 A 178,178 0 0,1 169,25"/>
        <path id="jmArcBL" d="M 169,375 A 178,178 0 0,1 25,231"/>

      </defs>
      <circle cx="200" cy="200" r="196" fill="#000000"/>
      <g clip-path="url(#circClip)">
        <rect x="0" y="0" width="400" height="400" fill="url(#gRed)"/>
        <rect x="0" y="0" width="400" height="400" fill="url(#gYellow)" style="mix-blend-mode:screen"/>
        <rect x="0" y="0" width="400" height="400" fill="url(#gTeal)" style="mix-blend-mode:screen"/>
        <rect x="0" y="0" width="400" height="400" fill="url(#gGlow)" style="mix-blend-mode:screen"/>
      </g>
      <circle cx="200" cy="200" r="196" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <line x1="200" y1="4" x2="200" y2="396" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,5"/>
      <line x1="4" y1="200" x2="396" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,5"/>
      <circle cx="200" cy="200" r="196" fill="transparent"/>
      <!-- Curved edge labels -->
      <text font-size="11.5" font-weight="700" letter-spacing="2" fill="#ffe066" font-family="sans-serif" pointer-events="none" paint-order="stroke" stroke="#000" stroke-width="4" stroke-linejoin="round" opacity="0.85"><textPath href="#jmArcTR" startOffset="50%" text-anchor="middle">HAPPY · EXCITED</textPath></text>
      <text font-size="11.5" font-weight="700" letter-spacing="2" fill="#ff7070" font-family="sans-serif" pointer-events="none" paint-order="stroke" stroke="#000" stroke-width="4" stroke-linejoin="round" opacity="0.85"><textPath href="#jmArcTL" startOffset="50%" text-anchor="middle">ANGRY · TENSE</textPath></text>
      <text font-size="11.5" font-weight="700" letter-spacing="2" fill="#7ba3ff" font-family="sans-serif" pointer-events="none" paint-order="stroke" stroke="#000" stroke-width="4" stroke-linejoin="round" opacity="0.85"><textPath href="#jmArcBL" startOffset="50%" text-anchor="middle">SAD · LONELY</textPath></text>
      <text font-size="11.5" font-weight="700" letter-spacing="2" fill="#5ee8cc" font-family="sans-serif" pointer-events="none" paint-order="stroke" stroke="#000" stroke-width="4" stroke-linejoin="round" opacity="0.85"><textPath href="#jmArcBR" startOffset="50%" text-anchor="middle">CALM · SERENE</textPath></text>
    </svg>
    <div id="jmMoodName"></div>
    <div id="jmWheelPrompt">
      <div style="font-size:1.1em;font-weight:300;letter-spacing:0.1em;color:rgba(255,255,255,0.75);text-shadow:0 0 24px #000,0 0 8px #000;">Feel your music</div>
      <div style="font-size:0.72em;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.38);margin-top:6px;text-shadow:0 0 12px #000;">Tap to play</div>
    </div>
  </div>

  <div id="jmEraArea">
    <div id="jmEraLabelsTop"></div>
    <div id="jmEraWrap">
      <div id="jmEraBar"></div>
      <div id="jmEraHighlight"></div>
      <div id="jmEraDot"></div>
    </div>
    <div id="jmEraLabels"></div>
  </div>

  <div id="jmUpNext" style="display:none;margin-top:10px;font-size:0.75em;color:#555;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:min(80vw,420px);"></div>

  <div style="text-align:center;">
    <div id="jmStatus" style="font-size:0.8em;color:#777;min-height:1.2em;"></div>
  </div>

  <div id="jmPlayer" style="margin-top:16px;text-align:center;width:100%;max-width:420px;">
    <audio id="jmAudio" playsinline></audio>
    <div id="jmSearchWrap" style="position:relative;margin-bottom:10px;">
      <input id="jmSearch" type="search" placeholder="Search song…" autocomplete="off" autocapitalize="none" spellcheck="false"/>
      <div id="jmSuggest"></div>
    </div>
    <div id="jmControls" style="display:none;margin-top:16px;">
      <button id="jmBackBtn"  class="jm-btn">&#9198;</button>
      <button id="jmPauseBtn" class="jm-btn">&#9646;&#9646;</button>
      <button id="jmSkipBtn"  class="jm-btn">&#9197;</button>
      <button id="jmStopBtn"  class="jm-btn">&#9209;</button>
    </div>
  </div>
  <div id="jmPersistentPlay" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:8px 16px;border-radius:24px;display:none;align-items:center;gap:10px;z-index:100;max-width:90vw;">
    <span id="jmPersistentTrack" style="font-size:0.82em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;"></span>
    <button id="jmPersistentPlayBtn" class="jm-btn" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 14px;border-radius:20px;flex-shrink:0;">&#9654;</button>
    <button id="jmPersistentSkipBtn" class="jm-btn" style="background:rgba(255,255,255,0.12);border:none;color:#fff;padding:6px 14px;border-radius:20px;flex-shrink:0;">&#9197;</button>
  </div>

  <div id="jmTrackCount" style="display:none;margin-top:8px;font-size:0.78em;color:#555;text-align:center;"></div>
  <a href="#" onclick="history.back();return false;" style="margin-top:32px;color:#555;font-size:0.8em;text-decoration:none;">&#8592; Back</a>
  <div style="margin-top:8px;font-size:0.65em;color:#333;text-align:center;">v3.1.11.0</div>
</div>

<script>
var JM = {
  type: 'jellyfin',
  server: window.location.origin,
  token: null,
  userId: null,
  sectionId: null,
  username: null,
  password: null,
  init: function() {
    try {
      var keys = Object.keys(localStorage);
      for (var i = 0; i < keys.length; i++) {
        try {
          var raw = localStorage.getItem(keys[i]);
          if (!raw || raw[0] !== '{') continue;
          var val = JSON.parse(raw);
          if (val && val.Servers && val.Servers[0] && val.Servers[0].AccessToken) {
            this.token = val.Servers[0].AccessToken;
            this.userId = val.Servers[0].UserId;
            break;
          }
          if (val && val.AccessToken && val.User) {
            this.token = val.AccessToken;
            this.userId = val.User.Id;
            break;
          }
          // Android login page format: { type, serverUrl, accessToken, userId }
          if (val && val.accessToken && val.userId) {
            this.token = val.accessToken;
            this.userId = val.userId;
            if (val.serverUrl) this.server = val.serverUrl;
            break;
          }
          // Plex: { type:'plex', serverUrl, token, sectionId }
          if (val && val.type === 'plex' && val.token) {
            this.type = 'plex';
            this.token = val.token;
            this.server = val.serverUrl;
            this.sectionId = val.sectionId;
            break;
          }
          // Subsonic/Navidrome: { type:'subsonic', serverUrl, username, password }
          if (val && val.type === 'subsonic' && val.username) {
            this.type = 'subsonic';
            this.server = val.serverUrl;
            this.username = val.username;
            this.password = val.password;
            this.token = 'subsonic'; // truthy sentinel
            this.userId = val.username;
            break;
          }
        } catch(e) {}
      }
      var p = new URLSearchParams(window.location.search);
      if (p.get('token'))  this.token  = p.get('token');
      if (p.get('userId')) this.userId = p.get('userId');
    } catch(e) {}
  },
  headers: function() {
    if (this.type === 'plex')
      return { 'Accept': 'application/json', 'X-Plex-Token': this.token };
    if (this.type === 'subsonic') return {};
    return { 'X-Emby-Authorization':
      'MediaBrowser Client="Musian",Device="Browser",DeviceId="jm1",Version="1.0"' +
      (this.token ? ',Token="' + this.token + '"' : '') };
  },
  subAuth: function() {
    return '&u=' + encodeURIComponent(this.username) +
           '&p=' + encodeURIComponent(this.password) +
           '&v=1.16.1&c=Musian&f=json';
  },
  streamUrl: function(item) {
    if (this.type === 'plex') {
      if (item._partKey)
        return this.server + item._partKey + '?X-Plex-Token=' + this.token;
      // Fallback if Media.Part was not in the search response
      return this.server + '/library/metadata/' + item.Id + '/download?X-Plex-Token=' + this.token;
    }
    if (this.type === 'subsonic')
      return this.server + '/rest/stream.view?id=' + item.Id +
        '&u=' + encodeURIComponent(this.username) +
        '&p=' + encodeURIComponent(this.password) + '&v=1.16.1&c=Musian';
    var id = typeof item === 'object' ? item.Id : item;
    return this.server + '/Audio/' + id + '/universal' +
      '?UserId=' + this.userId +
      '&DeviceId=jm1' +
      '&MaxStreamingBitrate=140000000' +
      '&Container=mp3,aac,m4a,flac,ogg,opus,webma,webm,wav' +
      '&AudioCodec=aac,mp3,flac,opus,vorbis' +
      '&TranscodingContainer=mp3' +
      '&TranscodingProtocol=http' +
      '&api_key=' + this.token;
  }
};
JM.init();
(function() {
  var splash = document.getElementById('jmSplash');
  if (!splash) return;
  setTimeout(function() {
    splash.classList.add('fade');
    setTimeout(function() { splash.style.display = 'none'; }, 850);
  }, 1400);
})();
function jmFetch(url, opts) {
  var ctrl = new AbortController();
  var tid = setTimeout(function() { ctrl.abort(); }, 5000);
  return fetch(url, Object.assign({}, opts || {}, {signal: ctrl.signal}))
    .finally(function() { clearTimeout(tid); });
}
function normalizeTracks(items) {
  if (JM.type === 'plex') {
    return items.map(function(t) {
      return {
        Id: String(t.ratingKey),
        Name: t.title || '',
        Artists: t.grandparentTitle ? [t.grandparentTitle] : [],
        AlbumArtist: t.grandparentTitle || '',
        Genres: (t.Genre || []).map(function(g) { return g.tag; }),
        Moods:  (t.Mood  || []).map(function(m) { return m.tag; }),
        _partKey: t.Media && t.Media[0] && t.Media[0].Part && t.Media[0].Part[0]
                  ? t.Media[0].Part[0].key : ''
      };
    });
  }
  if (JM.type === 'subsonic') {
    return items.map(function(t) {
      return {
        Id: String(t.id),
        Name: t.title || '',
        Artists: t.artist ? [t.artist] : [],
        AlbumArtist: t.artist || '',
        Genres: t.genre ? [t.genre] : [],
        Moods: []
      };
    });
  }
  return items;
}

var jmGenreCache = null;
if (JM.token) {
  if (JM.type === 'plex') {
    jmFetch(JM.server + '/library/sections/' + JM.sectionId +
      '/genre?type=10&X-Plex-Token=' + JM.token, {headers:{'Accept':'application/json'}})
      .then(function(r){return r.json();})
      .then(function(d){ jmGenreCache = ((d.MediaContainer&&d.MediaContainer.Directory)||[]).map(function(g){return g.title;}); })
      .catch(function(){});
  } else if (JM.type === 'subsonic') {
    jmFetch(JM.server + '/rest/getGenres.view?u=' + encodeURIComponent(JM.username) +
      '&p=' + encodeURIComponent(JM.password) + '&v=1.16.1&c=Musian&f=json')
      .then(function(r){return r.json();})
      .then(function(d){ jmGenreCache = ((((d['subsonic-response']||{}).genres||{}).genre)||[]).map(function(g){return g.value;}); })
      .catch(function(){});
  } else {
    jmFetch(JM.server + '/Genres?' + new URLSearchParams({
      IncludeItemTypes:'Audio', Recursive:'true', Limit:'500'
    }), {headers: JM.headers()})
    .then(function(r){ return r.json(); })
    .then(function(d){ jmGenreCache = (d.Items||[]).map(function(g){ return g.Name; }); })
    .catch(function(){});
  }
}
if (!JM.token) {
  document.getElementById('jmStatus').textContent = 'Not signed in — please log in first.';
  document.getElementById('jmStatus').style.color = '#f88';
} else if (JM.type === 'plex') {
  jmFetch(JM.server + '/library/sections/' + JM.sectionId +
    '/all?type=10&X-Plex-Container-Size=0&X-Plex-Container-Start=0&X-Plex-Token=' + JM.token,
    {headers:{'Accept':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(d){
      var n = d.MediaContainer && d.MediaContainer.totalSize;
      document.getElementById('jmStatus').textContent = n ? n + ' audio tracks in library' : 'Connected to Plex';
    }).catch(function(){});
} else if (JM.type === 'subsonic') {
  document.getElementById('jmStatus').textContent = 'Connected to Navidrome';
} else {
  jmFetch(JM.server + '/Users/' + JM.userId + '/Items?' +
    new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', Limit:'1'}),
    {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var n = d.TotalRecordCount;
      if (n === 0 || n === undefined) {
        document.getElementById('jmStatus').textContent = 'Library has 0 audio tracks — check Jellyfin media libraries.';
        document.getElementById('jmStatus').style.color = '#f88';
      } else {
        document.getElementById('jmStatus').textContent = n + ' audio tracks in library';
      }
    })
    .catch(function() {
      document.getElementById('jmStatus').textContent = 'Could not reach Jellyfin API.';
      document.getElementById('jmStatus').style.color = '#f88';
    });
}

(function(){
'use strict';
var MOODS = [
  { name:'Aggressive',  desc:'Raw, forceful, confrontational',        x:0.08, y:0.95, col:'#ff2020',
    tags:['aggressive','aggression'],
    genres:['Metal','Punk','Hard Rock','Hardcore'] },
  { name:'Angry',       desc:'Hot, fierce, outraged',                 x:0.10, y:0.88, col:'#ff3535',
    tags:['angry','anger','choleric','fury','outraged','rage','angry music'],
    genres:['Metal','Hard Rock','Punk'] },
  { name:'Anxious',     desc:'Nervous, unsettled, on-edge',           x:0.22, y:0.78, col:'#ff6040',
    tags:['anxious','angst','anxiety','jumpy','nervous','angsty'],
    genres:['Punk','Alternative Rock','Grunge','Indie Rock'] },
  { name:'Pessimistic', desc:'Cynical, gloomy outlook, weltschmerz',  x:0.18, y:0.28, col:'#5060d0',

// Shirley-Chiu area-preserving square→disc mapping
function squareToDisc(x, y) {
  var a = 2*x - 1, b = 2*y - 1;
  if (a === 0 && b === 0) return [0.5, 0.5];
  var r, theta;
  if (Math.abs(a) >= Math.abs(b)) {
    r = a; theta = (Math.PI/4) * (b/a);
  } else {
    r = b; theta = (Math.PI/2) - (Math.PI/4) * (a/b);
  }
  r *= 0.9; // keep slightly inside the rim
  return [0.5 + r * Math.cos(theta) * 0.5,
          0.5 - r * Math.sin(theta) * 0.5];
}

function getNearestTags(vx, vy, count) {
  var all = [];
  MOODS.forEach(function(m) {
    (m.tags || []).forEach(function(t) {
      var c = TAG_COORDS[t] || [m.x, m.y];
      var dx = vx - c[0], dy = vy - c[1];
      all.push({tag:t, mood:m, x:c[0], y:c[1], dist:dx*dx+dy*dy});
    });
  });
  all.sort(function(a,b){ return a.dist - b.dist; });
  return all.slice(0, count);
}

var ERAS = [
  { name:'Classical',       genres:['Classical','Opera','Orchestral','Baroque','Symphony'] },

];
var jmEraGenres  = null; // null = no era filter active
var jmMoodTags   = null; // tags from last mood tap, for era-zone re-search
var jmMoodLabels = [];   // persistent label elements on the disc

(function() {
  var wrap         = document.getElementById('jmEraWrap');
  var highlight    = document.getElementById('jmEraHighlight');
  var labelsTopEl  = document.getElementById('jmEraLabelsTop');
  var labelsEl     = document.getElementById('jmEraLabels');
  var n            = ERAS.length;

  // Build staggered labels: even indices above bar, odd indices below
  ERAS.forEach(function(era, i) {
    var top = document.createElement('span');
    var bot = document.createElement('span');
    if (i % 2 === 0) {
      top.textContent = era.name;
      bot.style.visibility = 'hidden'; bot.textContent = '\u00a0';
    } else {
      top.style.visibility = 'hidden'; top.textContent = '\u00a0';
      bot.textContent = era.name;
    }
    labelsTopEl.appendChild(top);
    labelsEl.appendChild(bot);
  });

  var eraLastIdx = -1, eraTapCount = 0, eraTapTimer = null;

  function handleEraInteraction(clientX) {
    var rect = wrap.getBoundingClientRect();
    var rel  = (clientX - rect.left) / rect.width;
    var idx  = Math.floor(rel * n);
    idx = Math.max(0, Math.min(n - 1, idx));

    // Track tap count on same zone
    if (idx === eraLastIdx) { eraTapCount++; } else { eraLastIdx = idx; eraTapCount = 1; }
    clearTimeout(eraTapTimer);
    eraTapTimer = setTimeout(function() { eraLastIdx = -1; eraTapCount = 0; }, 500);

    // Triple tap — clear filter entirely
    if (eraTapCount >= 3) {
      jmEraGenres = null;
      highlight.style.display = 'none';
      [labelsTopEl, labelsEl].forEach(function(row) {
        row.querySelectorAll('span').forEach(function(s) { s.style.color = ''; s.style.fontWeight = ''; });
      });
      if (jmMoodGenres !== null) {
        setStatus('Searching\u2026'); setTrackCount(0);
        var moodT = jmMoodTags || [];
        fetchTracksByTags(moodT)
          .then(function(i) { return i.length ? i : fetchTracksByGenres(jmMoodGenres); })
          .then(function(i) { return i.length ? i : fetchFallback(); })
          .then(function(i) { setTrackCount(i.length); if (!i.length) { setStatus('No tracks found.'); return; } startPlayback(i); })
          .catch(function() { setStatus('Could not fetch tracks.'); });
      }
      return;
    }

    var lo, hi;
    if (eraTapCount === 2) {
      lo = Math.max(0, idx - 1);
      hi = Math.min(n - 1, idx + 1);
    } else {
      lo = idx;
      hi = idx;
    }
    var selected = ERAS.slice(lo, hi + 1);

    // Position highlight over selected range
    var leftPct  = (lo / n) * 100;
    var widthPct = ((hi - lo + 1) / n) * 100;
    highlight.style.left    = leftPct + '%';
    highlight.style.width   = widthPct + '%';
    highlight.style.display = 'block';

    // Dim non-selected labels, brighten selected (both rows)
    [labelsTopEl, labelsEl].forEach(function(row) {
      row.querySelectorAll('span').forEach(function(s, i) {
        var active = (i >= lo && i <= hi);
        s.style.color = active ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.3)';
        s.style.fontWeight = active ? '700' : '400';
      });
    });

    // Set genre filter
    var genreMap = {};
    selected.forEach(function(e) { e.genres.forEach(function(g) { genreMap[g] = true; }); });
    jmEraGenres = Object.keys(genreMap);

    // Replay with new genre filter only if a mood was already selected
    if (jmMoodGenres !== null) {
      setStatus('Searching\u2026');
      setTrackCount(0);
      var eraG = jmEraGenres, moodG = jmMoodGenres, moodT = jmMoodTags || [];
      jmRefetchFn = function() { return fetchTracksByTags(moodT).then(function(i) { return i.length ? i : fetchTracksByGenres(eraG); }); };
      fetchTracksByTags(moodT)
        .then(function(items) { return items.length > 0 ? items : fetchTracksByGenres(eraG); })
        .then(function(items) { return items.length > 0 ? items : fetchTracksByGenres(moodG); })
        .then(function(items) { return items.length > 0 ? items : fetchFallback(); })
        .then(function(items) {
          setTrackCount(items.length);
          if (!items.length) { setStatus('No tracks found.'); return; }
          startPlayback(items);
        })
        .catch(function() { setStatus('Could not fetch tracks.'); });
    }
  }

  wrap.addEventListener('click', function(e) { handleEraInteraction(e.clientX); });
  wrap.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleEraInteraction(e.changedTouches[0].clientX);
  });
})();

function jmShowPrompt(visible) {

function jmAdvance(gen) {
  return function() {
    if (gen !== jmGeneration) return;
    jmPlayIdx++;
    jmPlayTrack(jmPlayIdx, gen);
  };
}

function jmUpdateMediaSession(item) {
  var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  item.Name  || 'Musian',
    artist: artist,
    album:  item.Album || '',
    artwork: JM.type === 'jellyfin' ? [{ src: JM.server + '/Items/' + item.Id + '/Images/Primary?maxHeight=256&quality=90&api_key=' + JM.token, sizes: '256x256', type: 'image/jpeg' }] : []
  });
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.setActionHandler('play', function() {
    jmAudio.play().catch(function() {});
    navigator.mediaSession.playbackState = 'playing';
  });
  navigator.mediaSession.setActionHandler('pause', function() {
    jmAudio.pause();
    navigator.mediaSession.playbackState = 'paused';
  });
  navigator.mediaSession.setActionHandler('nexttrack', function() {
    jmPlayIdx++; jmPlayTrack(jmPlayIdx, jmGeneration);
  });
  navigator.mediaSession.setActionHandler('previoustrack', function() {
    jmPlayIdx = Math.max(0, jmPlayIdx - 1);
    jmPlayTrack(jmPlayIdx, jmGeneration);
  });
  navigator.mediaSession.setActionHandler('stop', function() {
    document.getElementById('jmStopBtn').click();
  });
}

// Resume audio if the browser paused it when the screen locked (web path only)
document.addEventListener('visibilitychange', function() {
  if (window.NativeMedia) return;
  if (!document.hidden && jmPlaylist.length > 0) {
    if (jmAudio.ended) {
      jmPlayIdx++;
      jmPlayTrack(jmPlayIdx, jmGeneration);
    } else if (jmAudio.paused && !jmUserPaused) {
      jmAudio.play().catch(function() {});
    }
  }
});

function jmUpdatePersistentBar(item) {
  var bar = document.getElementById('jmPersistentPlay');
  var btn = document.getElementById('jmPersistentPlayBtn');
  var lbl = document.getElementById('jmPersistentTrack');
  if (!bar) return;
  if (item) {
    var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
    lbl.textContent = (artist ? artist + ' \u2014 ' : '') + (item.Name || '');
  }
  // Only show when screen is locked/hidden
  if (document.hidden && jmPlaylist.length > 0) {
    bar.style.display = 'flex';
    btn.innerHTML = jmAudio.paused ? '&#9654;' : '&#9646;&#9646;';
  }
}

function jmHidePersistentBar() {
  var bar = document.getElementById('jmPersistentPlay');
  if (bar) bar.style.display = 'none';
}

// Show/hide persistent bar on screen lock/unlock
document.addEventListener('visibilitychange', function() {
  if (document.hidden && jmPlaylist.length > 0) {
    jmUpdatePersistentBar(null);
  } else {
    jmHidePersistentBar();
  }
});

function jmPlayTrack(idx, gen) {
  if (gen !== jmGeneration) return;
  if (idx >= jmPlaylist.length) {
    setStatus('Playlist ended — tap the wheel to play again.');
    document.getElementById('jmSearch').placeholder = 'Search song\u2026';
    document.getElementById('jmControls').style.display = 'none';
    document.getElementById('jmUpNext').style.display = 'none';
    if (window._nativePollInterval) { clearInterval(window._nativePollInterval); window._nativePollInterval = null; }
    if (window.NativeMedia) window.NativeMedia.clearSession();
    if ('mediaSession' in navigator) { navigator.mediaSession.metadata = null; navigator.mediaSession.playbackState = 'none'; }
    jmHidePersistentBar();
    return;
  }
  jmUserPaused = false;
  var item = jmPlaylist[idx];
  jmPlayedIds.push(item.Id);
  if (jmPlayedIds.length > 500) jmPlayedIds = jmPlayedIds.slice(-500);
  // Prefetch next batch when 2 or fewer tracks remain (including current)
  if (jmRefetchFn && !jmFetching && jmPlaylist.length - idx <= 2) {
    jmFetching = true;
    var _gen = gen;
    jmRefetchFn().then(function(more) {
      if (_gen !== jmGeneration) return;
      jmFetching = false;
      var filtered = more.filter(function(t) { return jmPlayedIds.indexOf(t.Id) === -1; });
      if (!filtered.length && more.length) { jmPlayedIds = []; filtered = more; }
      more = filtered;
      if (_gen !== jmGeneration) return;
      if (more.length) {
        jmPlaylist = jmPlaylist.concat(more);
        if (window.NativeMedia) {
          more.forEach(function(t) {
            var ta = (t.Artists && t.Artists[0]) || t.AlbumArtist || '';
            window.NativeMedia.queueNextTrack(JM.streamUrl(t), t.Name || '', ta);
          });
        }
      }
    }).catch(function() { if (_gen === jmGeneration) jmFetching = false; });
  }
  var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
  var url = JM.streamUrl(item);
  if (window.NativeMedia) {
    if (window._nativePollInterval) { clearInterval(window._nativePollInterval); window._nativePollInterval = null; }
    window._nativeStartIdx = idx;
    window.NativeMedia.playTrack(url, item.Name || '', artist);
    for (var qi = idx + 1; qi < jmPlaylist.length; qi++) {
      var nx = jmPlaylist[qi];
      var na = (nx.Artists && nx.Artists[0]) || nx.AlbumArtist || '';
      window.NativeMedia.queueNextTrack(JM.streamUrl(nx), nx.Name || '', na);
    }
    var _pollGen = jmGeneration;
    window._nativePollInterval = setInterval(function() {
      if (!window.NativeMedia || jmGeneration !== _pollGen) {
        clearInterval(window._nativePollInterval);
        window._nativePollInterval = null;
        return;
      }
      var nativeIdx = window.NativeMedia.getNativeIndex();
      if (nativeIdx >= 0) jmNativeSyncIndex(nativeIdx);
    }, 150);
  } else {
    jmAudio.pause();
    jmAudio.src = url;
    jmAudio.play().catch(function() {});
  }
  document.getElementById('jmSearch').placeholder = (artist ? artist + ' \u2014 ' : '') + item.Name;
  document.getElementById('jmControls').style.display = 'block';
  var next = jmPlaylist[idx + 1];
  var upNextEl = document.getElementById('jmUpNext');
  if (next) {
    var na = (next.Artists && next.Artists[0]) || next.AlbumArtist || '';
    upNextEl.textContent = 'Up next \u00b7 ' + (na ? na + ' \u2014 ' : '') + next.Name;
    upNextEl.style.display = 'block';
  } else {
    upNextEl.style.display = 'none';
  }
  setStatus('Playing \u266a');
  jmUpdateMediaSession(item);
  jmUpdatePersistentBar(item);
  jmShowMoodTransition(item);
}

function jmNativeUpdateUI(idx) {
  var item = jmPlaylist[idx];
  if (!item) return;
  jmPlayedIds.push(item.Id);
  if (jmPlayedIds.length > 500) jmPlayedIds = jmPlayedIds.slice(-500);

    var na = (next.Artists && next.Artists[0]) || next.AlbumArtist || '';
    upEl.textContent = 'Up next \u00b7 ' + (na ? na + ' \u2014 ' : '') + next.Name;
    upEl.style.display = 'block';
  } else { upEl.style.display = 'none'; }
  setStatus('Playing \u266a');
  jmUpdatePersistentBar(item);
  jmShowMoodTransition(item);
  if (window.NativeMedia && jmRefetchFn && !jmFetching && jmPlaylist.length - idx <= 2) {
    jmFetching = true;
    var _gen = jmGeneration;
    jmRefetchFn().then(function(more) {
      if (_gen !== jmGeneration) return;
      jmFetching = false;
      var filtered = more.filter(function(t) { return jmPlayedIds.indexOf(t.Id) === -1; });
      if (!filtered.length && more.length) { jmPlayedIds = []; filtered = more; }
      more = filtered;
      if (_gen !== jmGeneration) return;
      if (more.length) {
        jmPlaylist = jmPlaylist.concat(more);
        more.forEach(function(t) {
          var ta = (t.Artists && t.Artists[0]) || t.AlbumArtist || '';
          window.NativeMedia.queueNextTrack(JM.streamUrl(t), t.Name || '', ta);
        });
      }
    }).catch(function() { if (_gen === jmGeneration) jmFetching = false; });
  }
}

function jmNativeSyncIndex(nativeIdx) {
  var target = (window._nativeStartIdx || 0) + nativeIdx;

  jmPlayIdx = target;

}

// ── Mood logic ───────────────────────────────────────────────────────────
function getNearestMoods(vx, vy, count) {
  return MOODS.slice().sort(function(a, b) {
    var da = (vx-a.x)*(vx-a.x) + (vy-a.y)*(vy-a.y);
    var db = (vx-b.x)*(vx-b.x) + (vy-b.y)*(vy-b.y);
    return da - db;
  }).slice(0, count);
}

function handleInteraction(clientX, clientY) {
  setMoodName('', '');
  var wrap = document.getElementById('jmWheelWrap');
  var rect = wrap.getBoundingClientRect();
  var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2, r = rect.width/2;
  var dx = clientX - cx, dy = clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) > r) return;

  var valence = (dx/r)*0.5 + 0.5;
  var arousal  = (-dy/r)*0.5 + 0.5;

  var nearTags = getNearestTags(valence, arousal, 5);
  var nearest1 = nearTags[0];

  // Show dot coloured by closest tag's parent mood
  var old = wrap.querySelectorAll('.jm-dot');
  for (var i = 0; i < old.length; i++) wrap.removeChild(old[i]);
  var dot = document.createElement('div');
  dot.className = 'jm-dot';
  dot.style.cssText = 'position:absolute;width:22px;height:22px;border-radius:50%;' +
    'transform:translate(-50%,-50%);pointer-events:none;' +
    'box-shadow:0 0 0 3px rgba(0,0,0,0.5),0 0 14px rgba(255,255,255,0.8);';
  dot.style.background = nearest1.mood.col;
  dot.style.left = (clientX - rect.left) + 'px';
  dot.style.top  = (clientY - rect.top)  + 'px';
  wrap.appendChild(dot);

  jmShowPrompt(false);
  setTrackCount(0);

  // Labels at per-tag positions — spread to avoid overlap, furthest fades in first
  clearMoodLabels();
  var n = nearTags.length;
  // Compute display positions and spread apart (min 0.15 of disc width)
  var labelPts = nearTags.map(function(t) {
    var dp = squareToDisc(t.x, t.y);
    return [dp[0] * rect.width, dp[1] * rect.height];
  });
  var minD = rect.width * 0.15;
  for (var iter = 0; iter < 20; iter++) {
    for (var a = 0; a < labelPts.length; a++) {
      for (var b = a+1; b < labelPts.length; b++) {
        var ddx = labelPts[b][0]-labelPts[a][0], ddy = labelPts[b][1]-labelPts[a][1];
        var dist = Math.sqrt(ddx*ddx+ddy*ddy);
        if (dist < minD && dist > 0) {
          var push = (minD-dist)/2+1;
          var nx = ddx/dist*push, ny = ddy/dist*push;
          labelPts[a][0]-=nx; labelPts[a][1]-=ny;
          labelPts[b][0]+=nx; labelPts[b][1]+=ny;
        }
      }
    }
  }
  nearTags.forEach(function(t, idx) {
    var el = document.createElement('div');
    el.className = 'jm-mlabel';
    el.textContent = t.tag;
    el.style.cssText = 'position:absolute;pointer-events:none;font-size:0.68em;font-weight:600;' +
      'letter-spacing:0.1em;text-transform:uppercase;color:' + t.mood.col + ';' +
      'text-shadow:0 0 12px #000,0 0 4px #000;transform:translate(-50%,-50%);' +
      'transition:opacity 0.6s;opacity:0;white-space:nowrap;';
    el.style.left = labelPts[idx][0] + 'px';
    el.style.top  = labelPts[idx][1] + 'px';
    wrap.appendChild(el);
    jmMoodLabels.push(el);
    // furthest (idx=n-1) fades in first, closest (idx=0) arrives last
    setTimeout(function() { el.style.opacity = '0.85'; }, 30 + (n-1-idx) * 400);
  });

  // Search: tags and genres from 4 nearest
  var tagMap = {}, genreMap = {};
  nearTags.forEach(function(t) {
    tagMap[t.tag] = true;
    (t.mood.genres || []).forEach(function(g) { genreMap[g] = true; });
  });
  var moodTags   = Object.keys(tagMap);
  var moodGenres = Object.keys(genreMap);
  jmMoodTags   = moodTags;
  jmMoodGenres = moodGenres;

  var searchGenres = jmEraGenres !== null ? jmEraGenres : moodGenres;
  jmRefetchFn = function() {
    return fetchTracksByTags(moodTags)
      .then(function(i) { return jmSupplement(i, function() { return fetchTracksByGenres(searchGenres); }, 25); })
      .then(function(i) { return jmSupplement(i, function() { return fetchTracksByTitleWords(moodTags); }, 25); });
  };

  setStatus('Searching\u2026');

  fetchTracksByTags(moodTags)
    .then(function(i) { return jmSupplement(i, function() { return fetchTracksByGenres(searchGenres); }, 25); })
    .then(function(i) { return jmSupplement(i, function() { return fetchTracksByTitleWords(moodTags); }, 25); })
    .then(function(i) { return i.length ? i : fetchFallback(); })
    .then(function(items) {
      for (var i = items.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = items[i]; items[i] = items[j]; items[j] = tmp;
      }
      setTrackCount(items.length);
      if (!items.length) { setStatus('No tracks found — check genre/mood tags in your library.'); return; }
      startPlayback(items);
    })
    .catch(function(e) {
      console.error('[Musian]', e);
      setStatus('Could not fetch tracks.');
    });
}

// ── API ───────────────────────────────────────────────────────────────────
function genreWordMatch(genre, seed) {
  var g = genre.toLowerCase();
  var s = seed.toLowerCase();
  return new RegExp('(?:^| )' + s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?= |$)').test(g);
}

function expandGenres(seeds) {
  if (!jmGenreCache || !jmGenreCache.length) return seeds;
  var result = {};
  seeds.forEach(function(seed) {
    result[seed] = true;
    jmGenreCache.forEach(function(g) {
      if (/^not[\s_]/i.test(g)) return;
      if (genreWordMatch(g, seed)) result[g] = true;
    });
  });
  return Object.keys(result);
}

function fetchTracksByGenres(genres) {
  if (JM.type === 'plex') {
    var promises = genres.map(function(g) {
      return jmFetch(JM.server + '/library/sections/' + JM.sectionId +
        '/all?type=10&sort=random&X-Plex-Container-Size=10&genre=' + encodeURIComponent(g) +
        '&X-Plex-Token=' + JM.token, {headers:{'Accept':'application/json'}})
        .then(function(r){return r.json();})
        .then(function(d){return (d.MediaContainer&&d.MediaContainer.Metadata)||[];})
        .catch(function(){return [];});
    });
    return Promise.all(promises).then(function(results) {
      var seen={}, merged=[];
      results.forEach(function(items){ items.forEach(function(t){
        if(!seen[t.ratingKey]){seen[t.ratingKey]=true; merged.push(t);}
      });});
      return normalizeTracks(merged);
    });
  }
  if (JM.type === 'subsonic') {
    var promises = genres.map(function(g) {
      return jmFetch(JM.server + '/rest/getSongsByGenre.view?genre=' +
        encodeURIComponent(g) + '&count=25' + JM.subAuth())
        .then(function(r){return r.json();})
        .then(function(d){return ((d['subsonic-response']||{}).songsByGenre||{}).song||[];})
        .catch(function(){return [];});
    });
    return Promise.all(promises).then(function(results) {
      var seen={}, merged=[];
      results.forEach(function(items){ items.forEach(function(t){
        if(!seen[t.id]){seen[t.id]=true; merged.push(t);}
      });});
      return normalizeTracks(merged);
    });
  }
  if (!JM.token || !JM.userId) return Promise.resolve([]);
  var expanded = expandGenres(genres);
  var params = new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', SortBy:'Random', Limit:'25', Fields:'Genres,MediaSources'});
  if (expanded.length > 0) params.set('Genres', expanded.join('|'));
  return jmFetch(JM.server + '/Users/' + JM.userId + '/Items?' + params, {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { return normalizeTracks(d.Items || []); });
}

function fetchFallback() {
  if (JM.type === 'plex') {
    return jmFetch(JM.server + '/library/sections/' + JM.sectionId +
      '/all?type=10&sort=random&X-Plex-Container-Size=10&X-Plex-Token=' + JM.token,
      {headers:{'Accept':'application/json'}})
      .then(function(r){return r.json();})
      .then(function(d){ return normalizeTracks((d.MediaContainer&&d.MediaContainer.Metadata)||[]); });
  }
  if (JM.type === 'subsonic') {
    return jmFetch(JM.server + '/rest/getRandomSongs.view?size=10' + JM.subAuth())
      .then(function(r){return r.json();})
      .then(function(d){ return normalizeTracks(((d['subsonic-response']||{}).randomSongs||{}).song||[]); });
  }
  if (!JM.token || !JM.userId) return Promise.resolve([]);
  return jmFetch(JM.server + '/Users/' + JM.userId + '/Items?' +
    new URLSearchParams({IncludeItemTypes:'Audio', Recursive:'true', SortBy:'Random', Limit:'25'}),
    {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.Items || []; });
}

function jmSupplement(base, fetchFn, limit) {
  if (base.length >= limit) return Promise.resolve(base);
  return fetchFn().then(function(more) {
    var seen = {};
    base.forEach(function(t) { seen[t.Id] = true; });
    more = more.filter(function(t) { return !seen[t.Id]; });
    return base.concat(more).slice(0, limit);
  });
}

function fetchTracksByTags(tags, genres) {
  if (!tags.length) return Promise.resolve([]);
  if (JM.type === 'plex') {
    var promises = tags.map(function(tag) {
      return jmFetch(JM.server + '/library/sections/' + JM.sectionId +
        '/all?type=10&X-Plex-Container-Size=5&mood=' + encodeURIComponent(tag) +
        '&X-Plex-Token=' + JM.token, {headers:{'Accept':'application/json'}})
        .then(function(r){return r.json();})
        .then(function(d){return (d.MediaContainer&&d.MediaContainer.Metadata)||[];})
        .catch(function(){return [];});
    });
    return Promise.all(promises).then(function(results) {
      var seen={}, merged=[];
      results.forEach(function(items){ items.forEach(function(t){
        if(!seen[t.ratingKey]){seen[t.ratingKey]=true; merged.push(t);}
      });});
      var tracks = normalizeTracks(merged);
      if (genres && genres.length) tracks = tracks.filter(function(t) {
        return (t.Genres||[]).some(function(g) {
          return genres.some(function(sg) { return genreWordMatch(g,sg)||genreWordMatch(sg,g); });
        });
      });
      return tracks;
    });
  }
  if (JM.type === 'subsonic') return Promise.resolve([]);
  if (!JM.token || !JM.userId) return Promise.resolve([]);
  var expanded = [];
  tags.forEach(function(t) {
    var cap = t.charAt(0).toUpperCase() + t.slice(1);
    expanded.push(t, cap, 'Mood:' + t, 'Mood:' + cap);
  });
  var params = new URLSearchParams({
    IncludeItemTypes:'Audio', Recursive:'true', SortBy:'Random',
    Limit:'25', Fields:'Genres,MediaSources',
    Tags: expanded.join('|')
  });
  if (genres && genres.length) params.set('Genres', expandGenres(genres).join('|'));
  return jmFetch(JM.server + '/Users/' + JM.userId + '/Items?' + params, {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.Items || []; });
}

  if (JM.type === 'subsonic') {

        if(!seen[t.id]){seen[t.id]=true; merged.push(t);}
      });});
      return normalizeTracks(merged);

  if (!JM.token || !JM.userId) return Promise.resolve([]);
  var promises = tags.map(function(tag) {
    return jmFetch(JM.server + '/Users/' + JM.userId + '/Items?' + new URLSearchParams({
      SearchTerm: tag, IncludeItemTypes: 'Audio', Recursive: 'true',
      Limit: '5', Fields: 'Genres,MediaSources'
    }), {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.Items || []; })
    .catch(function() { return []; });
  });
  return Promise.all(promises).then(function(results) {
    var seen = {}, merged = [];
    results.forEach(function(items) {
      items.forEach(function(item) {
        if (!seen[item.Id]) { seen[item.Id] = true; merged.push(item); }
      });
    });
    return merged;
  });
}

// ── Search ────────────────────────────────────────────────────────────────────
function findMoodForGenres(genres) {
  if (!(genres || []).length) return null;
  var best = null, bestScore = 0;
  MOODS.forEach(function(mood) {
    var score = 0;
    mood.genres.forEach(function(mg) {
      genres.forEach(function(g) { if (genreWordMatch(g, mg) || genreWordMatch(mg, g)) score++; });
    });
    if (score > bestScore) { bestScore = score; best = mood; }
  });
  return best;
}

function placeEraDot(genres) {
  var dot = document.getElementById('jmEraDot');
  var bestIdx = -1, bestScore = 0;
  ERAS.forEach(function(era, i) {
    var score = 0;
    era.genres.forEach(function(eg) {
      (genres || []).forEach(function(g) { if (genreWordMatch(g, eg) || genreWordMatch(eg, g)) score++; });
    });
    if (score > bestScore) { bestScore = score; bestIdx = i; }
  });
  if (bestIdx === -1) { dot.style.display = 'none'; return; }
  dot.style.left = ((bestIdx + 0.5) / ERAS.length * 100) + '%';
  dot.style.display = 'block';
}
function placeDotForMood(mood) {
  var wrap = document.getElementById('jmWheelWrap');
  var rect = wrap.getBoundingClientRect();
  var old = wrap.querySelectorAll('.jm-dot');
  for (var i = 0; i < old.length; i++) wrap.removeChild(old[i]);
  var dot = document.createElement('div');
  dot.className = 'jm-dot';
  dot.style.cssText = 'position:absolute;width:22px;height:22px;border-radius:50%;' +
    'transform:translate(-50%,-50%);pointer-events:none;' +
    'box-shadow:0 0 0 3px rgba(0,0,0,0.5),0 0 14px rgba(255,255,255,0.8);';
  dot.style.background = mood.col;
  var dp = squareToDisc(mood.x, mood.y);
  dot.style.left = (dp[0] * rect.width) + 'px';
  dot.style.top  = (dp[1] * rect.height) + 'px';
  wrap.appendChild(dot);
}

function highlightGenreBarForGenres(genres) {
  var bestIdx = 0, bestScore = -1;
  ERAS.forEach(function(era, i) {
    var score = 0;
    era.genres.forEach(function(eg) {
      (genres || []).forEach(function(g) { if (genreWordMatch(g, eg) || genreWordMatch(eg, g)) score++; });
    });
    if (score > bestScore) { bestScore = score; bestIdx = i; }
  });
  if (bestScore > 0) {
    var n = ERAS.length;
    var hl = document.getElementById('jmEraHighlight');
    hl.style.left  = (bestIdx / n * 100) + '%';
    hl.style.width = (1 / n * 100) + '%';
    hl.style.display = 'block';
    ['jmEraLabelsTop', 'jmEraLabels'].forEach(function(id) {
      document.getElementById(id).querySelectorAll('span').forEach(function(s, i) {
        s.style.color      = i === bestIdx ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.3)';
        s.style.fontWeight = i === bestIdx ? '700' : '400';
      });
    });
  }
}

(function() {
  var input   = document.getElementById('jmSearch');
  var suggest = document.getElementById('jmSuggest');
  var timer   = null;

  input.addEventListener('input', function() {
    clearTimeout(timer);
    var q = input.value.trim();
    if (!q) { suggest.style.display = 'none'; return; }
    timer = setTimeout(function() { doSearch(q); }, 300);
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { suggest.style.display = 'none'; }, 150);
  });

  function doSearch(q) {
    if (!JM.token) return;
    if (JM.type === 'plex') {
      var filters = ['title', 'grandparentTitle', 'parentTitle'];
      var promises = filters.map(function(f) {
        return jmFetch(JM.server + '/library/sections/' + JM.sectionId +
          '/all?type=10&X-Plex-Container-Size=5&' + f + '=' + encodeURIComponent(q) +
          '&X-Plex-Token=' + JM.token, {headers:{'Accept':'application/json'}})
          .then(function(r){return r.json();})
          .then(function(d){return (d.MediaContainer&&d.MediaContainer.Metadata)||[];})
          .catch(function(){return [];});
      });
      Promise.all(promises).then(function(results) {
        var seen={}, merged=[];
        results.forEach(function(items){ items.forEach(function(t){
          if(!seen[t.ratingKey]){seen[t.ratingKey]=true; merged.push(t);}
        });});
        renderSuggestions(normalizeTracks(merged));
      });
      return;
    }
    if (JM.type === 'subsonic') {
      jmFetch(JM.server + '/rest/search3.view?query=' + encodeURIComponent(q) +
        '&songCount=8' + JM.subAuth())
        .then(function(r){return r.json();})
        .then(function(d){ renderSuggestions(normalizeTracks((((d['subsonic-response']||{}).searchResult3)||{}).song||[])); })
        .catch(function(){});
      return;
    }
    if (!JM.userId) return;
    jmFetch(JM.server + '/Users/' + JM.userId + '/Items?' + new URLSearchParams({
      SearchTerm: q, IncludeItemTypes: 'Audio', Recursive: 'true',
      Limit: '8', Fields: 'Genres,Artists,AlbumArtist,AlbumId'
    }), {headers: JM.headers()})
    .then(function(r) { return r.json(); })
    .then(function(d) { renderSuggestions(d.Items || []); })
    .catch(function() {});
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderSuggestions(items) {
    suggest.innerHTML = '';
    if (!items.length) { suggest.style.display = 'none'; return; }
    items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'jm-sug-item';
      var artist = (item.Artists && item.Artists[0]) || item.AlbumArtist || '';
      div.innerHTML = '<div class="jm-sug-title">' + escHtml(item.Name) + '</div>' +
        (artist ? '<div class="jm-sug-artist">' + escHtml(artist) + '</div>' : '');
      div.addEventListener('mousedown', function() { selectSong(item); });
      suggest.appendChild(div);
    });
    suggest.style.display = 'block';
  }

  function selectSong(item) {
    suggest.style.display = 'none';
    input.value = '';
    var genres = item.Genres || [];
    function proceed(g) {
      var mood = null;
      var moods = (item.Moods || []).filter(function(m) { return !/^not[\s_]/i.test(m); });
      if (moods.length) {
        var mn = moods[0].toLowerCase();
        for (var mi = 0; mi < MOODS.length; mi++) {
          if (MOODS[mi].name.toLowerCase() === mn) { mood = MOODS[mi]; break; }
        }
      }
      if (!mood) mood = findMoodForGenres(g);
      var _tags = [], _genres = [];
      if (mood) {
        var nearest = getNearestTags(mood.x, mood.y, 5);
        var tagMap = {}, genreMap = {};
        nearest.forEach(function(t) {
          tagMap[t.tag] = true;
          (t.mood.genres || []).forEach(function(gg) { genreMap[gg] = true; });
        });
        _tags   = Object.keys(tagMap);
        _genres = Object.keys(genreMap);
        placeDotForMood(mood);
        highlightGenreBarForGenres(g);
      }
      var searchGenres = jmEraGenres !== null ? jmEraGenres : _genres;
      jmMoodTags   = _tags;
      jmMoodGenres = _genres;
      var seedGenres = g.length ? g : null;
      jmRefetchFn = function() {
        return _tags.length
          ? fetchTracksByTags(_tags, seedGenres)
              .then(function(i) { return jmSupplement(i, function() { return fetchTracksByGenres(seedGenres || searchGenres); }, 25); })
              .then(function(i) { return jmSupplement(i, function() { return fetchTracksByTitleWords(_tags); }, 25); })
          : fetchTracksByGenres(seedGenres || searchGenres);
      };
      setStatus('Searching\u2026');
      jmRefetchFn().then(function(more) {
        var seen = {}; seen[item.Id] = true;
        var all = [item].concat(more.filter(function(t) { return !seen[t.Id]; })).slice(0, 25);
        startPlayback(all);
      }).catch(function() { startPlayback([item]); });
    }
    if (!genres.length && JM.type === 'jellyfin' && item.AlbumId && JM.token && JM.userId) {
      jmFetch(JM.server + '/Users/' + JM.userId + '/Items/' + item.AlbumId + '?Fields=Genres', {headers: JM.headers()})
        .then(function(r) { return r.json(); })
        .then(function(d) { proceed(d.Genres || []); })
        .catch(function() { proceed([]); });
    } else {
      proceed(genres);
    }
  }
})();

})();
</script>
